<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOMBA BOWLS - Divadelní klub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Bomba%20Bowls%22,%22short_name%22:%22Bomba%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22#ffffff%22,%22theme_color%22:%22#f97316%22,%22icons%22:[{%22src%22:%22https://cdn-icons-png.flaticon.com/512/2917/2917633.png%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22}]}">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2917/2917633.png">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .search-results { position: absolute; z-index: 100; width: 100%; max-height: 250px; overflow-y: auto; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="pb-32 text-slate-900">

    <nav class="bg-white shadow-md p-4 sticky top-0 z-50 flex justify-between items-center border-b-2 border-orange-500">
        <h1 class="text-xl font-black text-orange-500 italic uppercase cursor-pointer" onclick="window.location.reload()">Bomba Bowls </h1>
        <div class="flex gap-2">
            <button onclick="secureView('admin')" class="px-3 py-2 bg-black text-white rounded-xl text-[10px] font-black uppercase italic text-orange-400">Admin 🔒</button>
            <button onclick="secureView('orders')" class="px-3 py-2 bg-green-600 text-white rounded-xl text-[10px] font-black uppercase italic">Kuchyň 👨‍🍳</button>
        </div>
    </nav>

    <section id="view-admin" class="hidden max-w-7xl mx-auto p-4 space-y-8">
        <div class="bg-white p-6 rounded-[3rem] shadow-xl border-t-8 border-orange-500 text-center">
            <h2 class="font-black text-2xl uppercase italic text-slate-800">Plánovač (Polévka + 3 Jídla)</h2>
            <div class="grid lg:grid-cols-2 gap-8 mt-8">
                <div class="bg-slate-50 p-5 rounded-[2.5rem] border-2 border-slate-100">
                    <h3 class="font-black text-orange-600 uppercase mb-4 italic text-xs">📅 Tento týden</h3>
                    <div id="admin-plan-current" class="space-y-4"></div>
                </div>
                <div class="bg-orange-50 p-5 rounded-[2.5rem] border-2 border-orange-100">
                    <h3 class="font-black text-blue-600 uppercase mb-4 italic text-xs">📅 Příští týden</h3>
                    <div id="admin-plan-next" class="space-y-4"></div>
                </div>
            </div>
            <div class="mt-8 space-y-3">
                <button onclick="publishMenu()" class="w-full bg-blue-600 text-white p-6 rounded-3xl font-black uppercase shadow-xl hover:scale-[1.01] transition-transform">📢 ZVEŘEJNIT MENU PRO ZÁKAZNÍKY</button>
                <button onclick="rolloverWeek()" class="w-full bg-red-600 text-white p-4 rounded-3xl font-black uppercase text-[10px] opacity-70">➔ Reset týdne (Archivace)</button>
            </div>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border-t-8 border-blue-500 text-xs">
                <h3 class="font-black text-blue-600 mb-4 uppercase italic">Firmy a Ceny</h3>
                <div id="admin-firms-ui" class="space-y-2 mb-4 bg-blue-50 p-4 rounded-2xl">
                    <input id="edit-firm-id" type="hidden"><input id="f-name" placeholder="Název firmy" class="w-full p-3 rounded-xl font-bold mb-2">
                    <div class="grid grid-cols-2 gap-2"><input id="f-bowl" type="number" placeholder="Bowl Kč" class="p-3 rounded-xl font-bold"><input id="f-soup" type="number" placeholder="Soup Kč" class="p-3 rounded-xl font-bold"></div>
                    <button onclick="saveFirm()" class="w-full bg-blue-600 text-white py-3 mt-2 rounded-xl font-black uppercase">Uložit Firmu</button>
                </div>
                <div id="admin-firms-list" class="space-y-2 max-h-48 overflow-y-auto"></div>
            </div>
            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border-t-8 border-orange-500 text-xs">
                <h3 class="font-black text-orange-600 mb-4 uppercase italic">Zákazníci a PINy</h3>
                <div id="admin-cust-ui" class="space-y-2 mb-4 bg-orange-50 p-4 rounded-2xl">
                    <input id="edit-cust-id" type="hidden"><input id="c-name" placeholder="Jméno" class="w-full p-3 rounded-xl font-bold mb-2">
                    <div class="grid grid-cols-2 gap-2"><select id="c-firm" class="p-3 rounded-xl font-bold"></select><input id="c-pin" type="number" placeholder="PIN" class="p-3 rounded-xl font-bold"></div>
                    <button onclick="saveCustomer()" class="w-full bg-orange-500 text-white py-3 mt-2 rounded-xl font-black uppercase">Uložit Zákazníka</button>
                </div>
                <div id="admin-customers-list" class="space-y-2 max-h-48 overflow-y-auto"></div>
            </div>
        </div>

        <div class="bg-slate-800 p-8 rounded-[3rem] text-white shadow-2xl">
            <h2 class="font-black text-lg uppercase mb-4 italic text-orange-400 text-center">📦 Sklad Jídel</h2>
            <div class="bg-slate-700 p-6 rounded-3xl mb-6 grid md:grid-cols-4 gap-3">
                <input id="edit-meal-id" type="hidden"><input id="m-name" placeholder="Název" class="p-4 rounded-2xl bg-slate-600 text-white"><input id="m-desc" placeholder="Popis" class="p-4 rounded-2xl bg-slate-600 text-white">
                <select id="m-cat" class="p-4 rounded-2xl bg-slate-600 text-white"><option>Bowl</option><option>Polévka</option></select>
                <button onclick="saveMeal()" class="bg-orange-500 text-white px-8 rounded-2xl font-black uppercase">Uložit</button>
            </div>
            <div id="library-list" class="grid grid-cols-2 md:grid-cols-5 gap-3 max-h-80 overflow-y-auto custom-scroll"></div>
        </div>
    </section>

    <section id="view-orders" class="hidden max-w-6xl mx-auto p-4"></section>

    <section id="view-user" class="max-w-4xl mx-auto p-4">
        <div id="user-login" class="max-w-md mx-auto bg-white p-10 rounded-[3.5rem] shadow-2xl text-center mt-10">
            <h2 class="text-2xl font-black mb-6 text-orange-500 uppercase italic">Přihlaš se</h2>
            <div class="relative mb-4">
                <input id="user-search-input" type="text" placeholder="Napiš své jméno..." oninput="searchUser(this)" class="w-full p-5 rounded-2xl bg-slate-100 font-bold text-center">
                <div id="user-search-results" class="search-results hidden absolute w-full mt-2 left-0 shadow-2xl bg-white rounded-2xl overflow-hidden"></div>
            </div>
            <input id="selected-user-data" type="hidden">
            <input id="user-pin-input" type="password" inputmode="numeric" placeholder="PIN" class="w-full p-5 rounded-2xl bg-slate-100 font-bold mb-6 text-center text-4xl tracking-widest">
            <button onclick="userLogin()" class="bg-orange-500 text-white w-full py-5 rounded-3xl font-black text-xl uppercase">Vstoupit</button>
        </div>

        <div id="user-order-zone" class="hidden">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-xl mb-6 text-center">
                <h2 id="active-user-display" class="font-black text-xl italic uppercase text-slate-800"></h2>
                <div id="published-status-msg" class="hidden text-red-500 font-bold mt-2">MENU JEŠTĚ NEBYLO ZVEŘEJNĚNO</div>
                <div class="flex justify-between items-center mt-4 bg-slate-100 p-4 rounded-2xl">
                    <span class="font-black uppercase text-xs">Celkem k úhradě:</span>
                    <span id="total-price" class="font-black text-xl text-orange-600">0 Kč</span>
                </div>
                <button onclick="submitOrder()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg mt-4">Uložit objednávku ✅</button>
            </div>
            <div id="user-menu-grid" class="grid md:grid-cols-2 gap-4">
                <div id="list-current"></div>
                <div id="list-next"></div>
            </div>
        </div>
    </section>

    <script>
        const SUPABASE_URL = 'https://bepuispbvxkmidkztupi.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_T9PUk3RfftHoXwm2jz9ugg_l3GbE_Wy';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const DNY = ["Pondělí", "Úterý", "Středa", "Čtvrtek", "Pátek"];
        const ADMIN_PASS = "bomba2026";
        
        let currentUser = null, selectedItems = {}, globalMeals = [], allCustomers = [];

        window.onload = () => { initLogin(); };

        function secureView(v) { if(prompt("Heslo:") === ADMIN_PASS) switchView(v); }
        function switchView(v) { document.querySelectorAll('section').forEach(s => s.classList.add('hidden')); document.getElementById('view-' + v).classList.remove('hidden'); if(v === 'admin') renderAdmin(); if(v === 'orders') renderKitchen(); }

        // --- CORE DATA ---
        async function initLogin() {
            const { data: c } = await _supabase.from('customers').select('*').order('name');
            const { data: f } = await _supabase.from('firms').select('*');
            allCustomers = c?.map(p => {
                const fr = f?.find(x => x.name.trim() === p.firm_name.trim());
                return { ...p, pb: fr ? fr.custom_price_bowl : 169, ps: fr ? fr.custom_price_soup : 49 };
            }) || [];
        }

        function searchUser(input) {
            const q = input.value.toLowerCase(), res = document.getElementById('user-search-results');
            if (q.length < 1) { res.classList.add('hidden'); return; }
            const fil = allCustomers.filter(u => u.name.toLowerCase().includes(q));
            res.classList.toggle('hidden', fil.length === 0);
            res.innerHTML = fil.map(u => `<div onclick="selectUserForLogin('${u.name}','${u.pin}','${u.firm_name}',${u.pb},${u.ps})" class="p-4 hover:bg-orange-50 border-b cursor-pointer font-bold text-sm flex justify-between"><span>${u.name}</span><span class="text-[10px] text-slate-400 uppercase">${u.firm_name}</span></div>`).join('');
        }

        function selectUserForLogin(name, pin, firm, pb, ps) {
            document.getElementById('user-search-input').value = name;
            const hidden = document.getElementById('selected-user-data');
            hidden.dataset.name = name; hidden.dataset.pin = pin; hidden.dataset.firm = firm; hidden.dataset.pb = pb; hidden.dataset.ps = ps;
            document.getElementById('user-search-results').classList.add('hidden');
        }

        async function userLogin() {
            const h = document.getElementById('selected-user-data'), pin = document.getElementById('user-pin-input').value;
            if (h.dataset.name && pin === h.dataset.pin) {
                currentUser = { name: h.dataset.name, firm: h.dataset.firm, pb: Number(h.dataset.pb), ps: Number(h.dataset.ps) };
                document.getElementById('user-login').classList.add('hidden');
                document.getElementById('user-order-zone').classList.remove('hidden');
                document.getElementById('active-user-display').innerText = `🥗 ${currentUser.name} (${currentUser.firm})`;
                await loadOrderHistory();
                renderUserMenu();
            } else { alert("Chybné jméno nebo PIN!"); }
        }

        // --- ADMIN FUNKCE ---
        async function renderAdmin() {
            const { data } = await _supabase.from('meals').select('*').order('name');
            globalMeals = data || [];
            renderLibraryUI(); await renderPlanner(); await renderFirms(); await renderCustomers();
        }

        async function renderPlanner() {
            const { data: menu } = await _supabase.from('meal_templates').select('*');
            const build = (w) => DNY.map(d => {
                const dm = menu?.filter(m => m.day === d && m.week === w) || [];
                const s = dm.filter(m => m.category === 'Polévka'), b = dm.filter(m => m.category !== 'Polévka');
                return `<div class="bg-white p-4 rounded-2xl shadow-sm border mb-3 text-xs text-left">
                    <div class="flex justify-between font-black uppercase text-slate-400 mb-2"><span>${d}</span><span>${dm.length}/4</span></div>
                    <div class="mb-2">${s.map(m => `<div class="flex justify-between bg-blue-50 p-2 rounded mb-1"><span>${m.name}</span><button onclick="delPlan('${m.id}')" class="text-red-400">✕</button></div>`).join('')}</div>
                    <div class="mb-2">${b.map(m => `<div class="flex justify-between bg-slate-50 p-2 rounded mb-1"><span>${m.name}</span><button onclick="delPlan('${m.id}')" class="text-red-400">✕</button></div>`).join('')}</div>
                    <input type="text" placeholder="🔍 Přidat..." oninput="searchMeal(this,'${d}','${w}')" class="w-full p-2 rounded-xl bg-slate-100 border-none text-[10px]">
                    <div id="results-${w}-${d}" class="search-results hidden border"></div>
                </div>`;
            }).join('');
            document.getElementById('admin-plan-current').innerHTML = build('current');
            document.getElementById('admin-plan-next').innerHTML = build('next');
        }

        function searchMeal(input, den, week) {
            const q = input.value.toLowerCase(), res = document.getElementById(`results-${week}-${den}`);
            if (q.length < 1) { res.classList.add('hidden'); return; }
            const fil = globalMeals.filter(m => m.name.toLowerCase().includes(q));
            res.classList.remove('hidden');
            res.innerHTML = fil.map(m => `<div onclick="addMealToPlan('${m.id}','${den}','${week}')" class="p-2 hover:bg-orange-50 cursor-pointer flex justify-between"><span>${m.name}</span><span class="text-[8px] uppercase">${m.category}</span></div>`).join('');
        }

        async function addMealToPlan(libId, den, week) {
            const lib = globalMeals.find(m => m.id === libId);
            await _supabase.from('meal_templates').insert([{ name: lib.name, description: lib.description, category: lib.category, day: den, week: week }]);
            renderPlanner();
        }
        async function delPlan(id) { await _supabase.from('meal_templates').delete().eq('id', id); renderPlanner(); }

        // --- FIRMY, CUSTOMERS, SKLAD ---
        async function renderFirms() {
            const { data } = await _supabase.from('firms').select('*').order('name');
            document.getElementById('admin-firms-list').innerHTML = data?.map(f => `<div class="flex justify-between p-2 border-b text-[10px]"><span>${f.name} (B:${f.custom_price_bowl} S:${f.custom_price_soup})</span><button onclick="delFirm('${f.id}')" class="text-red-500">✕</button></div>`).join("");
            document.getElementById('c-firm').innerHTML = data?.map(f => `<option value="${f.name}">${f.name}</option>`).join("");
        }
        async function saveFirm() { await _supabase.from('firms').insert([{ name: document.getElementById('f-name').value, custom_price_bowl: document.getElementById('f-bowl').value, custom_price_soup: document.getElementById('f-soup').value }]); renderFirms(); }
        async function delFirm(id) { await _supabase.from('firms').delete().eq('id', id); renderFirms(); }

        async function renderCustomers() {
            const { data } = await _supabase.from('customers').select('*').order('name');
            document.getElementById('admin-customers-list').innerHTML = data?.map(c => `<div class="flex justify-between p-2 border-b text-[10px]"><span>${c.name} (${c.firm_name})</span><button onclick="delCust('${c.id}')" class="text-red-500">✕</button></div>`).join("");
            initLogin();
        }
        async function saveCustomer() { await _supabase.from('customers').insert([{ name: document.getElementById('c-name').value, firm_name: document.getElementById('c-firm').value, pin: document.getElementById('c-pin').value }]); renderCustomers(); }
        async function delCust(id) { await _supabase.from('customers').delete().eq('id', id); renderCustomers(); }

        function renderLibraryUI() {
            document.getElementById('library-list').innerHTML = globalMeals.map(m => `<div class="bg-slate-700 p-2 rounded text-[10px] flex justify-between"><span>${m.name}</span><button onclick="delLib('${m.id}')" class="text-red-400">✕</button></div>`).join("");
        }
        async function saveMeal() { await _supabase.from('meals').insert([{ name: document.getElementById('m-name').value, description: document.getElementById('m-desc').value, category: document.getElementById('m-cat').value }]); renderAdmin(); }
        async function delLib(id) { await _supabase.from('meals').delete().eq('id', id); renderAdmin(); }

        // --- ZÁKAZNICKÉ MENU ---
        async function renderUserMenu() {
            const isPub = localStorage.getItem('menu_published') === 'true';
            document.getElementById('published-status-msg').classList.toggle('hidden', isPub);
            document.getElementById('user-menu-grid').classList.toggle('hidden', !isPub);
            if(!isPub) return;

            const { data: menu } = await _supabase.from('meal_templates').select('*');
            const draw = (w, id) => {
                let h = `<h2 class="bg-slate-800 text-white p-3 rounded-2xl text-center font-black uppercase text-xs mb-4">${w==='current'?'Tento týden':'Příští týden'}</h2>`;
                DNY.forEach(d => {
                    const dm = menu?.filter(m => m.day === d && m.week === w) || [];
                    if(dm.length) {
                        h += `<div class="bg-white p-4 rounded-3xl border mb-4 shadow-sm"><p class="font-black uppercase text-[10px] text-slate-400 mb-2">${d}</p>`;
                        dm.forEach(m => {
                            const u = `${m.name} (${d})`, isS = selectedItems[u];
                            const price = m.category.toLowerCase().includes("polévka") ? currentUser.ps : currentUser.pb;
                            h += `<div onclick="toggleSelect('${u}', ${price})" class="p-3 rounded-2xl border-2 mb-2 cursor-pointer ${isS ? 'border-green-500 bg-green-50' : 'bg-slate-50 border-transparent'}">
                                <div class="flex justify-between font-bold text-xs"><span>${m.name}</span><span>${price} Kč</span></div>
                            </div>`;
                        });
                        h += `</div>`;
                    }
                });
                document.getElementById(id).innerHTML = h;
            };
            draw('current', 'list-current'); draw('next', 'list-next');
        }

        function toggleSelect(n, p) { if(selectedItems[n]) delete selectedItems[n]; else selectedItems[n] = { name: n, price: p }; updateTotal(); renderUserMenu(); }
        function updateTotal() { let t = 0; for(let k in selectedItems) t += selectedItems[k].price; document.getElementById('total-price').innerText = t + " Kč"; }
        
        async function submitOrder() {
            const items = Object.keys(selectedItems).join(", ");
            await _supabase.from('orders').delete().eq('user_name', currentUser.name);
            await _supabase.from('orders').insert([{ user_name: currentUser.name, user_firm: currentUser.firm, items: items }]);
            alert("Objednávka uložena!");
        }

        async function loadOrderHistory() {
            const { data } = await _supabase.from('orders').select('*').eq('user_name', currentUser.name).limit(1);
            selectedItems = {};
            if(data?.[0]?.items) {
                data[0].items.split(", ").forEach(it => {
                    const isS = it.toLowerCase().includes('polévka');
                    selectedItems[it] = { name: it, price: isS ? currentUser.ps : currentUser.pb };
                });
            }
            updateTotal();
        }

        // --- KUCHYŇ ---
        async function renderKitchen() {
            const { data: orders } = await _supabase.from('orders').select('*');
            const cont = document.getElementById('view-orders');
            cont.innerHTML = '<h2 class="text-3xl font-black uppercase italic text-center mb-8">Kuchyň 👨‍🍳</h2>';
            if (!orders?.length) { cont.innerHTML += '<p class="text-center">Žádné objednávky</p>'; return; }

            DNY.forEach(d => {
                let counts = {}, firms = {}, has = false;
                orders.forEach(o => {
                    if(o.items) o.items.split(", ").forEach(it => {
                        if(it.includes(`(${d})`)) {
                            has = true; const meal = it.replace(`(${d})`,'').trim();
                            counts[meal] = (counts[meal] || 0) + 1;
                            if(!firms[o.user_firm]) firms[o.user_firm] = {};
                            firms[o.user_firm][meal] = (firms[o.user_firm][meal] || 0) + 1;
                        }
                    });
                });
                if(has) {
                    let h = `<div class="bg-white p-6 rounded-[2.5rem] shadow-lg border-l-8 border-green-500 mb-8 max-w-4xl mx-auto"><h3 class="text-2xl font-black uppercase mb-4 text-green-600">${d}</h3><div class="grid md:grid-cols-2 gap-6"><div><p class="font-bold mb-2">CELKEM:</p>`;
                    for(let m in counts) h += `<div class="flex justify-between border-b py-1"><span>${m}</span><span class="font-bold">${counts[m]}x</span></div>`;
                    h += `</div><div><p class="font-bold mb-2">DLE FIREM:</p>`;
                    for(let f in firms) { h += `<div class="mb-2 p-2 bg-slate-50 rounded"><strong>${f}:</strong>`; for(let m in firms[f]) h += `<div class="text-xs">${m} - ${firms[f][m]}x</div>`; h += `</div>`; }
                    cont.innerHTML += h + `</div></div></div>`;
                }
            });
        }

        function publishMenu() { localStorage.setItem('menu_published', 'true'); alert("Zveřejněno!"); }
        async function rolloverWeek() { if(confirm("Reset týdne?")) { localStorage.setItem('menu_published', 'false'); await _supabase.from('orders').delete().neq('user_name',''); await _supabase.from('meal_templates').delete().eq('week','current'); await _supabase.from('meal_templates').update({week:'current'}).eq('week','next'); renderAdmin(); } }
    </script>
</body>
</html>
