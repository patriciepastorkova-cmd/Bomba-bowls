<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOMBA BOWLS - Divadelní klub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .search-results { position: absolute; z-index: 100; width: 100%; max-height: 250px; overflow-y: auto; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="pb-32 text-slate-900">

    <nav class="bg-white shadow-md p-4 sticky top-0 z-50 flex justify-between items-center border-b-2 border-orange-500">
        <h1 class="text-xl font-black text-orange-500 italic uppercase cursor-pointer" onclick="window.location.reload()">Bomba Bowls </h1>
        <div class="flex gap-2">
            <button onclick="secureView('admin')" class="px-3 py-2 bg-black text-white rounded-xl text-[10px] font-black uppercase italic text-orange-400">Admin 🔒</button>
            <button onclick="secureView('orders')" class="px-3 py-2 bg-green-600 text-white rounded-xl text-[10px] font-black uppercase italic">Kuchyň 👨‍🍳</button>
        </div>
    </nav>

    <section id="view-admin" class="hidden max-w-7xl mx-auto p-4 space-y-8">
        <div class="bg-white p-6 rounded-[3rem] shadow-xl border-t-8 border-orange-500 text-center">
            <h2 class="font-black text-2xl uppercase italic text-slate-800">Plánovač Menu</h2>
            <div class="grid lg:grid-cols-2 gap-8 mt-8">
                <div class="bg-slate-50 p-5 rounded-[2.5rem] border-2 border-slate-100">
                    <h3 class="font-black text-orange-600 uppercase mb-4 italic text-xs">📅 Tento týden</h3>
                    <div id="admin-plan-current" class="space-y-4"></div>
                </div>
                <div class="bg-orange-50 p-5 rounded-[2.5rem] border-2 border-orange-100">
                    <h3 class="font-black text-blue-600 uppercase mb-4 italic text-xs">📅 Příští týden</h3>
                    <div id="admin-plan-next" class="space-y-4"></div>
                </div>
            </div>
            <div class="mt-8 space-y-3">
                <button onclick="publishMenu()" class="w-full bg-blue-600 text-white p-6 rounded-3xl font-black uppercase shadow-xl hover:scale-[1.01] transition-transform">📢 ZVEŘEJNIT MENU PRO ZÁKAZNÍKY</button>
                <button onclick="rolloverWeek()" class="w-full bg-red-600 text-white p-4 rounded-3xl font-black uppercase text-[10px] opacity-70">➔ Reset týdne (Archivace)</button>
            </div>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border-t-8 border-blue-500 text-xs">
                <h3 class="font-black text-blue-600 mb-4 uppercase italic">Firmy a Ceny</h3>
                <div class="space-y-2 mb-4 bg-blue-50 p-4 rounded-2xl">
                    <input id="edit-firm-id" type="hidden">
                    <input id="f-name" placeholder="Název firmy" class="w-full p-3 rounded-xl font-bold mb-2">
                    <div class="grid grid-cols-2 gap-2">
                        <input id="f-bowl" type="number" placeholder="Bowl Kč" class="p-3 rounded-xl font-bold">
                        <input id="f-soup" type="number" placeholder="Soup Kč" class="p-3 rounded-xl font-bold">
                    </div>
                    <button onclick="saveFirm()" class="w-full bg-blue-600 text-white py-3 mt-2 rounded-xl font-black uppercase">Uložit Firmu</button>
                </div>
                <div id="admin-firms-list" class="space-y-2 max-h-48 overflow-y-auto custom-scroll"></div>
            </div>
            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border-t-8 border-orange-500 text-xs">
                <h3 class="font-black text-orange-600 mb-4 uppercase italic">Zákazníci a PINy</h3>
                <div class="space-y-2 mb-4 bg-orange-50 p-4 rounded-2xl">
                    <input id="edit-cust-id" type="hidden">
                    <input id="c-name" placeholder="Jméno" class="w-full p-3 rounded-xl font-bold mb-2">
                    <div class="grid grid-cols-2 gap-2">
                        <select id="c-firm" class="p-3 rounded-xl font-bold"></select>
                        <input id="c-pin" type="number" placeholder="PIN" class="p-3 rounded-xl font-bold">
                    </div>
                    <button onclick="saveCustomer()" class="w-full bg-orange-500 text-white py-3 mt-2 rounded-xl font-black uppercase">Uložit Zákazníka</button>
                </div>
                <div id="admin-customers-list" class="space-y-2 max-h-48 overflow-y-auto custom-scroll"></div>
            </div>
        </div>

        <div class="bg-slate-800 p-8 rounded-[3rem] text-white shadow-2xl">
            <h2 class="font-black text-lg uppercase mb-4 italic text-orange-400 text-center">📦 Sklad Jídel</h2>
            <div class="bg-slate-700 p-6 rounded-3xl mb-6 grid md:grid-cols-4 gap-3">
                <input id="edit-meal-id" type="hidden">
                <input id="m-name" placeholder="Název" class="p-4 rounded-2xl bg-slate-600 text-white font-bold">
                <input id="m-desc" placeholder="Popis (zobrazí se zákazníkovi)" class="p-4 rounded-2xl bg-slate-600 text-white font-bold">
                <select id="m-cat" class="p-4 rounded-2xl bg-slate-600 text-white font-bold">
                    <option>Bowl</option>
                    <option>Polévka</option>
                </select>
                <button onclick="saveMeal()" class="bg-orange-500 text-white px-8 rounded-2xl font-black uppercase">Uložit</button>
            </div>
            <div id="library-list" class="grid grid-cols-2 md:grid-cols-5 gap-3 max-h-80 overflow-y-auto custom-scroll"></div>
        </div>
    </section>

    <section id="view-orders" class="hidden max-w-6xl mx-auto p-4"></section>

    <section id="view-user" class="max-w-4xl mx-auto p-4">
        <div id="user-login" class="max-w-md mx-auto bg-white p-10 rounded-[3.5rem] shadow-2xl text-center mt-10">
            <h2 class="text-2xl font-black mb-6 text-orange-500 uppercase italic">Přihlaš se</h2>
            <div class="relative mb-4">
                <input id="user-search-input" type="text" placeholder="Začni psát jméno..." oninput="searchUser(this)" class="w-full p-5 rounded-2xl bg-slate-100 font-bold text-center">
                <div id="user-search-results" class="search-results hidden absolute w-full mt-2 left-0 shadow-2xl bg-white rounded-2xl overflow-hidden"></div>
            </div>
            <input id="selected-user-data" type="hidden">
            <input id="user-pin-input" type="password" inputmode="numeric" placeholder="PIN" class="w-full p-5 rounded-2xl bg-slate-100 font-bold mb-6 text-center text-4xl tracking-widest">
            <button onclick="userLogin()" class="bg-orange-500 text-white w-full py-5 rounded-3xl font-black text-xl uppercase shadow-lg">Vstoupit</button>
        </div>

        <div id="user-order-zone" class="hidden">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-xl mb-6 text-center">
                <h2 id="active-user-display" class="font-black text-xl italic uppercase text-slate-800"></h2>
                <div id="published-status-msg" class="hidden text-red-500 font-bold mt-2 italic">MENU JEŠTĚ NEBYLO ZVEŘEJNĚNO</div>
                <div class="flex justify-between items-center mt-4 bg-slate-100 p-4 rounded-2xl">
                    <span class="font-black uppercase text-xs">Celkem:</span>
                    <span id="total-price" class="font-black text-xl text-orange-600">0 Kč</span>
                </div>
                <button onclick="submitOrder()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg mt-4">Uložit objednávku ✅</button>
            </div>
            <div id="user-menu-grid" class="grid md:grid-cols-2 gap-4">
                <div id="list-current"></div>
                <div id="list-next"></div>
            </div>
        </div>
    </section>

    <script>
        const SUPABASE_URL = 'https://bepuispbvxkmidkztupi.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_T9PUk3RfftHoXwm2jz9ugg_l3GbE_Wy';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const DNY = ["Pondělí", "Úterý", "Středa", "Čtvrtek", "Pátek"];
        const ADMIN_PASS = "bomba2026";
        
        let currentUser = null, selectedItems = {}, globalMeals = [], allCustomers = [];

        window.onload = () => { initLogin(); };

        function secureView(v) { if(prompt("Heslo:") === ADMIN_PASS) switchView(v); }
        function switchView(v) { document.querySelectorAll('section').forEach(s => s.classList.add('hidden')); document.getElementById('view-' + v).classList.remove('hidden'); if(v === 'admin') renderAdmin(); if(v === 'orders') renderKitchen(); }

        // --- CORE DATA & LOGIN ---
        async function initLogin() {
            const { data: c } = await _supabase.from('customers').select('*').order('name');
            const { data: f } = await _supabase.from('firms').select('*').order('name');
            allCustomers = c?.map(p => {
                const fr = f?.find(x => x.name.trim() === p.firm_name.trim());
                return { ...p, pb: fr ? fr.custom_price_bowl : 169, ps: fr ? fr.custom_price_soup : 49 };
            }) || [];
            // Update firm dropdown in admin
            const firmSelect = document.getElementById('c-firm');
            if(firmSelect) firmSelect.innerHTML = f?.map(fr => `<option value="${fr.name}">${fr.name}</option>`).join('') || '';
        }

        function searchUser(input) {
            const q = input.value.toLowerCase(), res = document.getElementById('user-search-results');
            if (q.length < 1) { res.classList.add('hidden'); return; }
            const fil = allCustomers.filter(u => u.name.toLowerCase().includes(q));
            res.classList.toggle('hidden', fil.length === 0);
            res.innerHTML = fil.map(u => `<div onclick="selectUserForLogin('${u.name}','${u.pin}','${u.firm_name}',${u.pb},${u.ps})" class="p-4 hover:bg-orange-50 border-b cursor-pointer font-bold text-sm flex justify-between"><span>${u.name}</span><span class="text-[10px] text-slate-400 uppercase">${u.firm_name}</span></div>`).join('');
        }

        function selectUserForLogin(name, pin, firm, pb, ps) {
            document.getElementById('user-search-input').value = name;
            const h = document.getElementById('selected-user-data');
            h.dataset.name = name; h.dataset.pin = pin; h.dataset.firm = firm; h.dataset.pb = pb; h.dataset.ps = ps;
            document.getElementById('user-search-results').classList.add('hidden');
            document.getElementById('user-pin-input').focus();
        }

        async function userLogin() {
            const h = document.getElementById('selected-user-data'), pin = document.getElementById('user-pin-input').value;
            if (h.dataset.name && pin === h.dataset.pin) {
                currentUser = { name: h.dataset.name, firm: h.dataset.firm, pb: Number(h.dataset.pb), ps: Number(h.dataset.ps) };
                document.getElementById('user-login').classList.add('hidden');
                document.getElementById('user-order-zone').classList.remove('hidden');
                document.getElementById('active-user-display').innerText = `🥗 ${currentUser.name} (${currentUser.firm})`;
                await loadOrderHistory();
                renderUserMenu();
            } else { alert("Chybné jméno nebo PIN!"); }
        }

        // --- ADMIN FUNKCE (Firms, Customers, Meals) ---
        async function renderAdmin() {
            const { data: m } = await _supabase.from('meals').select('*').order('name');
            globalMeals = m || [];
            renderLibraryUI(); await renderPlanner(); await renderFirms(); await renderCustomers();
        }

        // Firmy
        async function renderFirms() {
            const { data } = await _supabase.from('firms').select('*').order('name');
            document.getElementById('admin-firms-list').innerHTML = data?.map(f => `
                <div class="flex justify-between p-2 border-b items-center bg-slate-50 rounded-xl mb-1">
                    <span class="font-bold">${f.name} (B:${f.custom_price_bowl} S:${f.custom_price_soup})</span>
                    <div class="flex gap-2">
                        <button onclick="prepFirmEdit('${f.id}')" class="text-blue-500 font-bold">Edit</button>
                        <button onclick="delFirm('${f.id}')" class="text-red-500 font-bold">✕</button>
                    </div>
                </div>`).join("") || "";
        }
        async function saveFirm() {
            const id = document.getElementById('edit-firm-id').value, n = document.getElementById('f-name').value, b = document.getElementById('f-bowl').value, s = document.getElementById('f-soup').value;
            if(id) await _supabase.from('firms').update({ name: n, custom_price_bowl: b, custom_price_soup: s }).eq('id', id);
            else await _supabase.from('firms').insert([{ name: n, custom_price_bowl: b, custom_price_soup: s }]);
            document.getElementById('edit-firm-id').value = ""; document.getElementById('f-name').value = ""; renderFirms(); initLogin();
        }
        function prepFirmEdit(id) {
            _supabase.from('firms').select('*').eq('id', id).single().then(({data:f}) => {
                document.getElementById('edit-firm-id').value=f.id; document.getElementById('f-name').value=f.name; document.getElementById('f-bowl').value=f.custom_price_bowl; document.getElementById('f-soup').value=f.custom_price_soup;
            });
        }
        async function delFirm(id) { if(confirm("Smazat firmu?")) { await _supabase.from('firms').delete().eq('id', id); renderFirms(); } }

        // Zákazníci
        async function renderCustomers() {
            const { data } = await _supabase.from('customers').select('*').order('name');
            document.getElementById('admin-customers-list').innerHTML = data?.map(c => `
                <div class="flex justify-between p-2 border-b items-center bg-slate-50 rounded-xl mb-1">
                    <span class="font-bold">${c.name} (${c.firm_name})</span>
                    <div class="flex gap-2">
                        <button onclick="prepCustEdit('${c.id}')" class="text-blue-500 font-bold">Edit</button>
                        <button onclick="delCust('${c.id}')" class="text-red-500 font-bold">✕</button>
                    </div>
                </div>`).join("") || "";
        }
        async function saveCustomer() {
            const id = document.getElementById('edit-cust-id').value, n = document.getElementById('c-name').value, f = document.getElementById('c-firm').value, p = document.getElementById('c-pin').value;
            if(id) await _supabase.from('customers').update({ name: n, firm_name: f, pin: p }).eq('id', id);
            else await _supabase.from('customers').insert([{ name: n, firm_name: f, pin: p }]);
            document.getElementById('edit-cust-id').value = ""; document.getElementById('c-name').value = ""; document.getElementById('c-pin').value = ""; renderCustomers(); initLogin();
        }
        function prepCustEdit(id) {
            _supabase.from('customers').select('*').eq('id', id).single().then(({data:c}) => {
                document.getElementById('edit-cust-id').value=c.id; document.getElementById('c-name').value=c.name; document.getElementById('c-firm').value=c.firm_name; document.getElementById('c-pin').value=c.pin;
            });
        }
        async function delCust(id) { if(confirm("Smazat zákazníka?")) { await _supabase.from('customers').delete().eq('id', id); renderCustomers(); } }

        // Sklad jídel
        function renderLibraryUI() {
            document.getElementById('library-list').innerHTML = globalMeals.map(m => `
                <div class="bg-slate-700 p-3 rounded-2xl flex flex-col justify-between text-[10px]">
                    <p class="font-bold truncate">${m.name}</p>
                    <div class="flex gap-1 mt-2">
                        <button onclick="prepMealEdit('${m.id}')" class="bg-slate-600 p-1 rounded font-black w-full text-orange-400">EDIT</button>
                        <button onclick="delLib('${m.id}')" class="bg-slate-600 p-1 rounded font-black w-full text-red-400">✕</button>
                    </div>
                </div>`).join("");
        }
        async function saveMeal() {
            const id = document.getElementById('edit-meal-id').value, n = document.getElementById('m-name').value, d = document.getElementById('m-desc').value, c = document.getElementById('m-cat').value;
            if(id) await _supabase.from('meals').update({ name: n, description: d, category: c }).eq('id', id);
            else await _supabase.from('meals').insert([{ name: n, description: d, category: c }]);
            document.getElementById('edit-meal-id').value = ""; document.getElementById('m-name').value = ""; document.getElementById('m-desc').value = ""; renderAdmin();
        }
        function prepMealEdit(id) {
            const m = globalMeals.find(x => x.id === id);
            document.getElementById('edit-meal-id').value=m.id; document.getElementById('m-name').value=m.name; document.getElementById('m-desc').value=m.description || ""; document.getElementById('m-cat').value=m.category;
        }
        async function delLib(id) { if(confirm("Smazat jídlo ze skladu?")) { await _supabase.from('meals').delete().eq('id', id); renderAdmin(); } }

        // --- PLÁNOVAČ ---
        async function renderPlanner() {
            const { data: menu } = await _supabase.from('meal_templates').select('*');
            const build = (w) => DNY.map(d => {
                const dm = menu?.filter(m => m.day === d && m.week === w) || [];
                const s = dm.filter(m => m.category === 'Polévka'), b = dm.filter(m => m.category !== 'Polévka');
                return `<div class="bg-white p-4 rounded-2xl shadow-sm border mb-3 text-xs text-left">
                    <div class="flex justify-between font-black uppercase text-slate-400 mb-2"><span>${d}</span><span>${dm.length}/4</span></div>
                    <div class="mb-2">${s.map(m => `<div class="flex justify-between bg-blue-50 p-2 rounded mb-1 font-bold"><span>${m.name}</span><button onclick="delPlan('${m.id}')" class="text-red-400">✕</button></div>`).join('')}</div>
                    <div class="mb-2">${b.map(m => `<div class="flex justify-between bg-slate-50 p-2 rounded mb-1 font-bold"><span>${m.name}</span><button onclick="delPlan('${m.id}')" class="text-red-400">✕</button></div>`).join('')}</div>
                    <input type="text" placeholder="🔍 Přidat jídlo..." oninput="searchMeal(this,'${d}','${w}')" class="w-full p-2 rounded-xl bg-slate-100 border-none text-[10px]">
                    <div id="results-${w}-${d}" class="search-results hidden border"></div>
                </div>`;
            }).join('');
            document.getElementById('admin-plan-current').innerHTML = build('current');
            document.getElementById('admin-plan-next').innerHTML = build('next');
        }
        function searchMeal(input, den, week) {
            const q = input.value.toLowerCase(), res = document.getElementById(`results-${week}-${den}`);
            if (q.length < 1) { res.classList.add('hidden'); return; }
            const fil = globalMeals.filter(m => m.name.toLowerCase().includes(q));
            res.classList.toggle('hidden', fil.length === 0);
            res.innerHTML = fil.map(m => `<div onclick="addMealToPlan('${m.id}','${den}','${week}')" class="p-2 hover:bg-orange-50 cursor-pointer flex justify-between font-bold"><span>${m.name}</span><span class="text-[8px] uppercase text-slate-400">${m.category}</span></div>`).join('');
        }
                async function addMealToPlan(libId, den, week) {
            const lib = globalMeals.find(m => m.id === libId);
            await _supabase.from('meal_templates').insert([{ name: lib.name, description: lib.description, category: lib.category, day: den, week: week }]);
            renderPlanner();
        }

        async function delPlan(id) { 
            await _supabase.from('meal_templates').delete().eq('id', id); 
            renderPlanner(); 
        }

        async function renderUserMenu() {
            // Safari Fix
            let isPub = localStorage.getItem('menu_published');
            isPub = (isPub === 'true' || isPub === null); 
            
            document.getElementById('published-status-msg').classList.toggle('hidden', isPub);
            document.getElementById('user-menu-grid').classList.toggle('hidden', !isPub);
            if(!isPub) return;

            const now = new Date();
            const currentDayIdx = now.getDay(); 
            const currentHour = now.getHours();
            // Pravidlo 14:00 + 48h (V pondělí po 14h zamkne Po, Út, St)
            let minAllowedDayIdx = 0;

            const { data: menu } = await _supabase.from('meal_templates').select('*');
            
            const draw = (w, id) => {
                let h = `<h2 class="bg-slate-800 text-white p-2 rounded-xl text-center font-black uppercase text-[10px] mb-3">${w==='current'?'Tento týden':'Příští týden'}</h2>`;
                DNY.forEach((d, idx) => {
                    const dayNum = idx + 1;
                    const isLocked = (w === 'current' && dayNum < minAllowedDayIdx);
                    const dm = menu?.filter(m => m.day === d && m.week === w) || [];
                    
                    if(dm.length) {
                        h += `<div class="bg-white p-3 rounded-2xl border mb-3 shadow-sm ${isLocked ? 'opacity-50 pointer-events-none grayscale' : ''}">
                            <div class="flex justify-between items-center mb-1">
                                <p class="font-black uppercase text-[9px] text-slate-400">${d}</p>
                                ${isLocked ? '<span class="text-[8px] font-bold text-red-500 uppercase italic">Uzávěrka vypršela</span>' : ''}
                            </div>`;
                        dm.forEach(m => {
                            const u = `${m.name} (${d})`;
                            const isS = selectedItems[u];
                            // Ceny podle firmy zákazníka
                            const pb = currentUser?.pb || 169;
                            const ps = currentUser?.ps || 49;
                            const price = (m.category||"").toLowerCase().includes("polévka") ? ps : pb;
                            
                            h += `<div onclick="toggleSelect('${u}', ${price})" class="p-3 rounded-xl border-2 mb-2 cursor-pointer ${isS ? 'border-green-500 bg-green-50' : 'bg-slate-50 border-transparent'}">
                                <div class="flex justify-between font-bold text-xs">
                                    <span>${m.name}</span>
                                    <span class="text-orange-600">${price} Kč</span>
                                </div>
                                ${m.description ? `<p class="text-[9px] text-slate-500 italic mt-1">${m.description}</p>` : ''}
                            </div>`;
                        });
                        h += `</div>`;
                    }
                });
                document.getElementById(id).innerHTML = h;
            };
            draw('current', 'list-current'); draw('next', 'list-next');
        }

        function toggleSelect(n, p) { if(selectedItems[n]) delete selectedItems[n]; else selectedItems[n] = { name: n, price: p }; updateTotal(); renderUserMenu(); }
        function updateTotal() { let t = 0; for(let k in selectedItems) t += selectedItems[k].price; document.getElementById('total-price').innerText = t + " Kč"; }
        
        async function submitOrder() {
            const items = Object.keys(selectedItems).join(", ");
            await _supabase.from('orders').delete().eq('user_name', currentUser.name);
            if(items) await _supabase.from('orders').insert([{ user_name: currentUser.name, user_firm: currentUser.firm, items: items }]);
            alert("Objednávka uložena! 🥗");
        }

        async function loadOrderHistory() {
            const { data } = await _supabase.from('orders').select('*').eq('user_name', currentUser.name).limit(1);
            selectedItems = {};
            if(data?.[0]?.items) {
                data[0].items.split(", ").forEach(it => {
                    const isS = it.toLowerCase().includes('polévka');
                    selectedItems[it] = { name: it, price: isS ? currentUser.ps : currentUser.pb };
                });
            }
            updateTotal();
        }

async function renderKitchen() {
            const { data: menu } = await _supabase.from('meal_templates').select('*');
            const { data: orders } = await _supabase.from('orders').select('*');
            const cont = document.getElementById('view-orders');
            cont.innerHTML = '<h2 class="text-3xl font-black uppercase text-center mb-10 text-[#800020]">Přehled Kuchyně 👨‍🍳</h2>';
            
            if (!orders?.length) { 
                cont.innerHTML += '<p class="text-center font-bold text-slate-400">Žádné objednávky</p>'; 
                return; 
            }

            const renderWeekSection = (weekLabel, weekKey) => {
                let hasData = false;
                let weekHtml = `<div class="space-y-6 mb-12">
                    <h3 class="bg-[#800020] text-white p-4 rounded-3xl text-center font-black uppercase italic shadow-lg">${weekLabel}</h3>
                    <div class="grid lg:grid-cols-1 gap-6">`;
                
                DNY.forEach(d => {
                    let counts = {}, firms = {}, dayOrders = [], dayExists = false;
                    const validMealsInTemplate = menu?.filter(m => m.day === d && m.week === weekKey).map(m => `${m.name} (${d})`) || [];

                    orders.forEach(o => {
                        if(o.items) {
                            o.items.split(", ").forEach(it => {
                                if(validMealsInTemplate.includes(it)) {
                                    dayExists = true; 
                                    hasData = true;
                                    const mealNameOnly = it.replace(`(${d})`,'').trim();
                                    
                                    counts[mealNameOnly] = (counts[mealNameOnly] || 0) + 1;
                                    
                                    if(!firms[o.user_firm]) firms[o.user_firm] = {};
                                    firms[o.user_firm][mealNameOnly] = (firms[o.user_firm][mealNameOnly] || 0) + 1;

                                    // TADY UKLÁDÁME DATA I S CELÝM NÁZVEM JÍDLA PRO MAZÁNÍ (jidlo_full)
                                    dayOrders.push({ jmeno: o.user_name, firma: o.user_firm, jidlo: mealNameOnly, jidlo_full: it });
                                }
                            });
                        }
                    });

                    if(dayExists) {
                        const dayId = `detail-${weekKey}-${d.replace(/\s/g, '')}`;
                        weekHtml += `<div class="bg-white p-6 rounded-[2.5rem] shadow-lg border-t-8 border-[#800020]">
                            <div class="flex justify-between items-center mb-6">
                                <h4 class="text-2xl font-black uppercase text-[#800020]">${d}</h4>
                                <button onclick="document.getElementById('${dayId}').classList.toggle('hidden')" class="bg-slate-800 text-white px-4 py-2 rounded-xl text-[10px] font-bold uppercase hover:bg-[#800020] transition-colors shadow-md">
                                    Detail / Zrušit jídlo 📋
                                </button>
                            </div>
                            
                            <div class="grid md:grid-cols-2 gap-8 mb-6">
                                <div><p class="text-[10px] font-black text-slate-400 uppercase mb-2 italic">Celkem porcí:</p>`;
                                for(let m in counts) weekHtml += `<div class="flex justify-between border-b py-1 font-bold text-lg text-slate-700"><span>${m}</span><span class="text-[#800020]">${counts[m]}x</span></div>`;
                        weekHtml += `</div><div><p class="text-[10px] font-black text-slate-400 uppercase mb-2 italic">Rozpis firem:</p>`;
                                for(let f in firms) { 
                                    weekHtml += `<div class="mb-2 p-3 bg-slate-50 rounded-xl text-xs border border-slate-100"><strong>${f}:</strong>`; 
                                    for(let m in firms[f]) weekHtml += `<div class="flex justify-between"><span>${m}</span><span class="font-bold">${firms[f][m]}x</span></div>`; 
                                    weekHtml += `</div>`; 
                                }
                        weekHtml += `</div></div>

                            <div id="${dayId}" class="hidden mt-6 border-t pt-6 bg-slate-50 rounded-3xl p-4 shadow-inner">
                                <p class="text-[10px] font-black text-[#800020] uppercase mb-3 text-center tracking-widest">Jmenovitý rozpis a správa objednávek</p>
                                <div class="overflow-x-auto">
                                    <table class="w-full text-left text-xs">
                                        <thead>
                                            <tr class="bg-white uppercase text-[9px] text-slate-400">
                                                <th class="p-3 rounded-l-2xl">Jméno</th>
                                                <th class="p-3">Firma</th>
                                                <th class="p-3">Jídlo</th>
                                                <th class="p-3 rounded-r-2xl text-right">Akce</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${dayOrders.sort((a,b) => a.firma.localeCompare(b.firma)).map(do_item => `
                                                <tr class="border-b border-slate-100 last:border-0">
                                                    <td class="p-3 font-bold text-slate-800">${do_item.jmeno}</td>
                                                    <td class="p-3 text-slate-500">${do_item.firma}</td>
                                                    <td class="p-3 italic text-[#800020] font-medium">${do_item.jidlo}</td>
                                                    <td class="p-3 text-right">
                                                        <button onclick="deleteOrderItem('${do_item.jmeno}', '${do_item.jidlo_full}')" class="bg-red-50 text-red-600 px-3 py-1 rounded-lg text-[10px] font-black uppercase hover:bg-red-600 hover:text-white transition-all">
                                                            Zrušit
                                                        </button>
                                                    </td>
                                                </tr>
                                            `).join('')}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>`;
                    }
                });
                weekHtml += `</div></div>`;
                return hasData ? weekHtml : '';
            };

            cont.innerHTML += renderWeekSection("Tento týden", "current");
            cont.innerHTML += renderWeekSection("Příští týden", "next");
        }

        // TUTO FUNKCI VLOŽ HNED POD TU PŘEDCHOZÍ (zajistí samotné smazání v databázi)
        async function deleteOrderItem(userName, fullItemName) {
            if (!confirm(`Opravdu chcete zrušit jídlo "${fullItemName}" pro uživatele ${userName}?`)) return;

            const { data } = await _supabase.from('orders').select('*').eq('user_name', userName).single();

            if (data && data.items) {
                let itemsArray = data.items.split(", ");
                const index = itemsArray.indexOf(fullItemName);
                if (index > -1) {
                    itemsArray.splice(index, 1);
                }

                if (itemsArray.length > 0) {
                    await _supabase.from('orders').update({ items: itemsArray.join(", ") }).eq('user_name', userName);
                } else {
                    await _supabase.from('orders').delete().eq('user_name', userName);
                }
                
                alert("Objednávka byla upravena.");
                renderKitchen(); // Znovu načte kuchyni, aby zmizelo to smazané
            }
        }


        function publishMenu() { localStorage.setItem('menu_published', 'true'); alert("Zveřejněno!"); }
        async function rolloverWeek() { if(confirm("Reset týdne?")) { localStorage.setItem('menu_published', 'false'); await _supabase.from('orders').delete().neq('user_name',''); await _supabase.from('meal_templates').delete().eq('week','current'); await _supabase.from('meal_templates').update({week:'current'}).eq('week','next'); renderAdmin(); } }
    </script>
</body>
