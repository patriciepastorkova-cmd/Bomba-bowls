<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOMBA BOWLS - Divadelní klub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Bomba%20Bowls%22,%22short_name%22:%22Bomba%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22#ffffff%22,%22theme_color%22:%22#f97316%22,%22icons%22:[{%22src%22:%22https://cdn-icons-png.flaticon.com/512/2917/2917633.png%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22}]}">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2917/2917633.png">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .search-results { position: absolute; z-index: 100; width: 100%; max-height: 250px; overflow-y: auto; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border: 1px solid #e2e8f0; }
        .day-card { transition: all 0.3s ease; }
    </style>
</head>
<body class="pb-32 text-slate-900">

    <nav class="bg-white shadow-md p-4 sticky top-0 z-50 flex justify-between items-center border-b-2 border-orange-500">
        <h1 class="text-xl font-black text-orange-500 italic uppercase cursor-pointer" onclick="window.location.reload()">Bomba Bowls </h1>
        <div class="flex gap-2">
            <button onclick="secureView('admin')" class="px-3 py-2 bg-black text-white rounded-xl text-[10px] font-black uppercase italic text-orange-400">Admin 🔒</button>
            <button onclick="secureView('orders')" class="px-3 py-2 bg-green-600 text-white rounded-xl text-[10px] font-black uppercase italic">Kuchyň 👨‍🍳</button>
        </div>
    </nav>

    <section id="view-admin" class="hidden max-w-7xl mx-auto p-4 space-y-8">
        <div class="bg-white p-6 rounded-[3rem] shadow-xl border-t-8 border-orange-500 text-center">
            <h2 class="font-black text-2xl uppercase italic text-slate-800">Plánovač (Polévka + 3 Jídla)</h2>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Sestavte menu pro oba týdny</p>
            
            <div class="grid lg:grid-cols-2 gap-8 mt-8">
                <div class="bg-slate-50 p-5 rounded-[2.5rem] border-2 border-slate-100">
                    <h3 class="font-black text-orange-600 uppercase mb-4 italic text-xs">📅 Tento týden</h3>
                    <div id="admin-plan-current" class="space-y-4"></div>
                </div>
                <div class="bg-orange-50 p-5 rounded-[2.5rem] border-2 border-orange-100">
                    <h3 class="font-black text-blue-600 uppercase mb-4 italic text-xs">📅 Příští týden</h3>
                    <div id="admin-plan-next" class="space-y-4"></div>
                </div>
            </div>

            <div class="mt-8 space-y-3">
                <button onclick="publishMenu()" class="w-full bg-blue-600 text-white p-6 rounded-3xl font-black uppercase shadow-xl hover:scale-[1.01] transition-transform">📢 ZVEŘEJNIT MENU PRO ZÁKAZNÍKY</button>
                <button onclick="rolloverWeek()" class="w-full bg-red-600 text-white p-4 rounded-3xl font-black uppercase text-[10px] opacity-70">➔ Reset týdne (Archivace)</button>
            </div>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border-t-8 border-blue-500 text-xs">
                <h3 class="font-black text-blue-600 mb-4 uppercase italic">Firmy a Ceny</h3>
                <div id="admin-firms-ui" class="space-y-2 mb-4 bg-blue-50 p-4 rounded-2xl">
                    <input id="edit-firm-id" type="hidden"><input id="f-name" placeholder="Název firmy" class="w-full p-3 rounded-xl font-bold mb-2 border-none shadow-sm">
                    <div class="grid grid-cols-2 gap-2"><input id="f-bowl" type="number" placeholder="Bowl Kč" class="p-3 rounded-xl font-bold shadow-sm border-none"><input id="f-soup" type="number" placeholder="Soup Kč" class="p-3 rounded-xl font-bold shadow-sm border-none"></div>
                    <button onclick="saveFirm()" class="w-full bg-blue-600 text-white py-3 mt-2 rounded-xl font-black uppercase">Uložit Firmu</button>
                </div>
                <div id="admin-firms-list" class="space-y-2 max-h-48 overflow-y-auto custom-scroll pr-2"></div>
            </div>
            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border-t-8 border-orange-500 text-xs">
                <h3 class="font-black text-orange-600 mb-4 uppercase italic">Zákazníci a PINy</h3>
                <div id="admin-cust-ui" class="space-y-2 mb-4 bg-orange-50 p-4 rounded-2xl">
                    <input id="edit-cust-id" type="hidden"><input id="c-name" placeholder="Jméno" class="w-full p-3 rounded-xl font-bold mb-2 border-none shadow-sm">
                    <div class="grid grid-cols-2 gap-2"><select id="c-firm" class="p-3 rounded-xl font-bold shadow-sm border-none"></select><input id="c-pin" type="number" placeholder="PIN" class="p-3 rounded-xl font-bold border-none shadow-sm"></div>
                    <button onclick="saveCustomer()" class="w-full bg-orange-500 text-white py-3 mt-2 rounded-xl font-black uppercase">Uložit Zákazníka</button>
                </div>
                <div id="admin-customers-list" class="space-y-2 max-h-48 overflow-y-auto custom-scroll pr-2"></div>
            </div>
        </div>

        <div class="bg-slate-800 p-8 rounded-[3rem] text-white shadow-2xl">
            <h2 class="font-black text-lg uppercase mb-4 italic text-orange-400 text-center">📦 Sklad Jídel</h2>
            <div class="bg-slate-700 p-6 rounded-3xl mb-6 grid md:grid-cols-4 gap-3">
                <input id="edit-meal-id" type="hidden"><input id="m-name" placeholder="Název" class="p-4 rounded-2xl bg-slate-600 border-none font-bold text-white"><input id="m-desc" placeholder="Popis" class="p-4 rounded-2xl bg-slate-600 border-none font-bold text-white">
                <select id="m-cat" class="p-4 rounded-2xl bg-slate-600 border-none font-bold text-white"><option>Bowl</option><option>Polévka</option></select>
                <button onclick="saveMeal()" class="bg-orange-500 text-white px-8 rounded-2xl font-black uppercase">Uložit</button>
            </div>
            <div id="library-list" class="grid grid-cols-2 md:grid-cols-5 gap-3 max-h-80 overflow-y-auto custom-scroll"></div>
        </div>
    </section>

    <section id="view-orders" class="hidden max-w-6xl mx-auto p-4"></section>

    <section id="view-user" class="max-w-4xl mx-auto p-4">
        <div id="user-login" class="max-w-md mx-auto bg-white p-10 rounded-[3.5rem] shadow-2xl text-center mt-10">
    <h2 class="text-2xl font-black mb-6 text-orange-500 uppercase italic">Přihlaš se</h2>
    
    <div class="relative mb-4">
        <input id="user-search-input" type="text" placeholder="Napiš své jméno..." 
               oninput="searchUser(this)" 
               class="w-full p-5 rounded-2xl bg-slate-100 font-bold border-none text-center">
        <div id="user-search-results" class="search-results hidden absolute w-full mt-2 left-0 shadow-2xl"></div>
    </div>

    <input id="selected-user-data" type="hidden">

    <input id="user-pin-input" type="password" inputmode="numeric" placeholder="PIN" 
           class="w-full p-5 rounded-2xl bg-slate-100 font-bold mb-6 text-center text-4xl tracking-widest">
    
    <button onclick="userLogin()" class="bg-orange-500 text-white w-full py-5 rounded-3xl font-black text-xl uppercase shadow-lg">Vstoupit</button>
</div>

    </section>

    <script>
        const SUPABASE_URL = 'https://bepuispbvxkmidkztupi.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_T9PUk3RfftHoXwm2jz9ugg_l3GbE_Wy';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const DNY = ["Pondělí", "Úterý", "Středa", "Čtvrtek", "Pátek"];
        const ADMIN_PASS = "bomba2026";
                let currentUser = null;
        let selectedItems = {};
        let globalMeals = [];
        let allCustomers = []; // Toto ti tam chybělo pro to hledání

        // Tento řádek zajistí, že se data načtou hned při startu:
        window.onload = async () => { await initLogin(); };


        function secureView(v) { if(prompt("Heslo:") === ADMIN_PASS) switchView(v); }
        function switchView(v) { document.querySelectorAll('section').forEach(s => s.classList.add('hidden')); document.getElementById('view-' + v).classList.remove('hidden'); if(v === 'admin') renderAdmin(); if(v === 'orders') renderKitchen(); }

        async function renderAdmin() {
            const { data } = await _supabase.from('meals').select('*').order('name');
            globalMeals = data || [];
            renderLibraryUI();
            await renderPlanner();
            await Promise.all([renderFirms(), renderCustomers()]);
        }

        // --- PLÁNOVAČ (POLÉVKA + 3 JÍDLA) ---
        async function renderPlanner() {
            const { data: menu } = await _supabase.from('meal_templates').select('*');
            const buildCol = (week) => DNY.map(den => {
                const dayMeals = menu?.filter(m => m.day === den && m.week === week) || [];
                const soups = dayMeals.filter(m => m.category === 'Polévka');
                const bowls = dayMeals.filter(m => m.category !== 'Polévka');

                return `<div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 mb-3 text-xs text-left">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-black uppercase text-slate-400">${den}</span>
                        <span class="text-[9px] font-bold ${dayMeals.length >= 4 ? 'text-green-500' : 'text-red-400'}">${dayMeals.length}/4</span>
                    </div>
                    
                    <div class="mb-2">
                        <p class="text-[8px] font-black text-blue-500 uppercase mb-1">Polévka (1):</p>
                        ${soups.map(m => `<div class="flex justify-between bg-blue-50 p-2 rounded-lg font-bold border border-blue-100 mb-1"><span>${m.name}</span><button onclick="delPlan('${m.id}')" class="text-red-400 px-1">✕</button></div>`).join('')}
                    </div>

                    <div class="mb-3">
                        <p class="text-[8px] font-black text-orange-500 uppercase mb-1">Hlavní jídla (3):</p>
                        ${bowls.map(m => `<div class="flex justify-between bg-slate-50 p-2 rounded-lg font-bold border border-slate-100 mb-1"><span>${m.name}</span><button onclick="delPlan('${m.id}')" class="text-red-400 px-1">✕</button></div>`).join('')}
                    </div>

                    <div class="relative">
                        <input type="text" placeholder="🔍 Přidat (začni psát...)" oninput="searchMeal(this,'${den}','${week}')" class="w-full p-2 rounded-xl bg-slate-100 border-none font-bold text-[10px]">
                        <div id="results-${week}-${den}" class="search-results hidden border"></div>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('admin-plan-current').innerHTML = buildCol('current');
            document.getElementById('admin-plan-next').innerHTML = buildCol('next');
        }

        function searchMeal(input, den, week) {
            const q = input.value.toLowerCase(), res = document.getElementById(`results-${week}-${den}`);
            if (q.length < 1) { res.classList.add('hidden'); return; }
            const fil = globalMeals.filter(m => m.name.toLowerCase().includes(q));
            if (fil.length > 0) {
                res.classList.remove('hidden');
                res.innerHTML = fil.map(m => `<div onclick="addMealToPlan('${m.id}','${den}','${week}')" class="p-3 hover:bg-orange-50 border-b cursor-pointer flex justify-between items-center"><span class="font-bold text-xs">${m.name}</span><span class="text-[8px] bg-slate-100 px-2 py-1 rounded font-black uppercase ${m.category === 'Polévka' ? 'text-blue-600' : 'text-orange-600'}">${m.category}</span></div>`).join('');
            } else res.classList.add('hidden');
        }

        async function addMealToPlan(libId, den, week) {
            const lib = globalMeals.find(m => m.id === libId);
            document.querySelectorAll('.search-results').forEach(r => r.classList.add('hidden'));
            document.querySelectorAll('input[placeholder*="Přidat"]').forEach(i => i.value = "");
            await _supabase.from('meal_templates').insert([{ name: lib.name, description: lib.description, category: lib.category, day: den, week: week }]);
            await renderPlanner();
        }

        async function delPlan(id) { await _supabase.from('meal_templates').delete().eq('id', id); await renderPlanner(); }

        // --- FIRMY A ZÁKAZNÍCI ---
        async function renderFirms() {
            const { data } = await _supabase.from('firms').select('*').order('name');
            document.getElementById('admin-firms-list').innerHTML = data?.map(f => `<div class="flex justify-between bg-slate-50 p-2 rounded-xl border font-bold text-[10px]"><span>${f.name} (B:${f.custom_price_bowl} S:${f.custom_price_soup})</span><div class="flex gap-2"><button onclick="prepFirmEdit('${f.id}')" class="text-blue-500">Edit</button><button onclick="delFirm('${f.id}')" class="text-red-500">✕</button></div></div>`).join("");
            document.getElementById('c-firm').innerHTML = data?.map(f => `<option value="${f.name}">${f.name}</option>`).join("");
        }
        async function saveFirm() {
            const id = document.getElementById('edit-firm-id').value, n = document.getElementById('f-name').value, b = document.getElementById('f-bowl').value, s = document.getElementById('f-soup').value;
            if(id) await _supabase.from('firms').update({ name: n, custom_price_bowl: b, custom_price_soup: s }).eq('id', id);
            else await _supabase.from('firms').insert([{ name: n, custom_price_bowl: b, custom_price_soup: s }]);
            document.getElementById('edit-firm-id').value = ""; document.getElementById('f-name').value = ""; renderFirms();
        }
        function prepFirmEdit(id) { _supabase.from('firms').select('*').eq('id', id).single().then(({data:f}) => { document.getElementById('edit-firm-id').value=f.id; document.getElementById('f-name').value=f.name; document.getElementById('f-bowl').value=f.custom_price_bowl; document.getElementById('f-soup').value=f.custom_price_soup; }); }
        async function delFirm(id) { if(confirm("Smazat?")) { await _supabase.from('firms').delete().eq('id', id); renderFirms(); } }

        async function renderCustomers() {
            const { data } = await _supabase.from('customers').select('*').order('name');
            document.getElementById('admin-customers-list').innerHTML = data?.map(c => `<div class="flex justify-between bg-slate-50 p-2 rounded-xl border font-bold text-[10px]"><span>${c.name} (${c.firm_name})</span><div class="flex gap-2"><button onclick="prepCustEdit('${c.id}')" class="text-orange-500">Edit</button><button onclick="delCust('${c.id}')" class="text-red-500">✕</button></div></div>`).join("");
            initLogin();
        }
        async function saveCustomer() {
            const id = document.getElementById('edit-cust-id').value, n = document.getElementById('c-name').value, f = document.getElementById('c-firm').value, p = document.getElementById('c-pin').value;
            if(id) await _supabase.from('customers').update({ name: n, firm_name: f, pin: p }).eq('id', id);
            else await _supabase.from('customers').insert([{ name: n, firm_name: f, pin: p }]);
            document.getElementById('edit-cust-id').value = ""; document.getElementById('c-name').value = ""; document.getElementById('c-pin').value = ""; renderCustomers();
        }
        function prepCustEdit(id) { _supabase.from('customers').select('*').eq('id', id).single().then(({data:c}) => { document.getElementById('edit-cust-id').value=c.id; document.getElementById('c-name').value=c.name; document.getElementById('c-firm').value=c.firm_name; document.getElementById('c-pin').value=c.pin; }); }
        async function delCust(id) { if(confirm("Smazat?")) { await _supabase.from('customers').delete().eq('id', id); renderCustomers(); } }

        // --- SKLAD ---
        function renderLibraryUI() {
            document.getElementById('library-list').innerHTML = globalMeals.map(m => `<div class="bg-slate-700 p-3 rounded-2xl border border-slate-600 flex flex-col justify-between text-[10px]">
                <p class="font-bold truncate">${m.name}</p>
                <div class="flex gap-1 mt-2"><button onclick="prepMealEdit('${m.id}')" class="text-[8px] bg-slate-600 p-2 rounded font-black uppercase w-full">Edit</button><button onclick="delLib('${m.id}')" class="text-[8px] text-red-400 p-2 rounded font-black uppercase w-full">✕</button></div>
            </div>`).join("");
        }
        async function saveMeal() {
            const id = document.getElementById('edit-meal-id').value, n = document.getElementById('m-name').value, d = document.getElementById('m-desc').value, c = document.getElementById('m-cat').value;
            if(id) await _supabase.from('meals').update({ name: n, description: d, category: c }).eq('id', id);
            else await _supabase.from('meals').insert([{ name: n, description: d, category: c }]);
            document.getElementById('edit-meal-id').value = ""; document.getElementById('m-name').value = ""; document.getElementById('m-desc').value = ""; renderAdmin();
        }
        function prepMealEdit(id) { const m = globalMeals.find(x => x.id === id); document.getElementById('edit-meal-id').value=m.id; document.getElementById('m-name').value=m.name; document.getElementById('m-desc').value=m.description; document.getElementById('m-cat').value=m.category; }
        async function delLib(id) { if(confirm("Smazat?")) { await _supabase.from('meals').delete().eq('id', id); renderAdmin(); } }

               // --- ZÁKAZNÍK ---
        let allCustomers = []; 

        async function initLogin() {
            console.log("Načítám data pro přihlášení...");
            const { data: c } = await _supabase.from('customers').select('*').order('name');
            const { data: f } = await _supabase.from('firms').select('*');
            
            if (!c) { console.error("Chyba načítání zákazníků"); return; }

            // Propojíme uživatele s cenami firem do jedné proměnné
            allCustomers = c.map(p => {
                const fr = f?.find(x => x.name.trim() === p.firm_name.trim());
                return {
                    ...p,
                    pb: fr ? fr.custom_price_bowl : 169,
                    ps: fr ? fr.custom_price_soup : 49
                };
            });
            console.log("Zákazníci připraveni:", allCustomers.length);
        }

        function searchUser(input) {
            const q = input.value.toLowerCase().trim();
            const res = document.getElementById('user-search-results');
            if (q.length < 1) { res.classList.add('hidden'); return; }

            const filtered = allCustomers.filter(u => u.name.toLowerCase().includes(q));
            
            if (filtered.length > 0) {
                res.classList.remove('hidden');
                res.innerHTML = filtered.map(u => `
                    <div onclick="selectUserForLogin('${u.name}', '${u.pin}', '${u.firm_name}', ${u.pb}, ${u.ps})" 
                         class="p-4 hover:bg-orange-50 border-b cursor-pointer font-bold text-sm flex justify-between bg-white">
                        <span>${u.name}</span>
                        <span class="text-[10px] text-slate-400 uppercase">${u.firm_name}</span>
                    </div>
                `).join('');
            } else {
                res.innerHTML = '<div class="p-4 text-slate-400 text-xs bg-white">Nenalezeno...</div>';
                res.classList.remove('hidden');
            }
        }

        function selectUserForLogin(name, pin, firm, pb, ps) {
            document.getElementById('user-search-input').value = name;
            const hiddenInput = document.getElementById('selected-user-data');
            hiddenInput.dataset.name = name;
            hiddenInput.dataset.pin = pin;
            hiddenInput.dataset.firm = firm;
            hiddenInput.dataset.pb = pb;
            hiddenInput.dataset.ps = ps;
            document.getElementById('user-search-results').classList.add('hidden');
        }

        async function userLogin() {
            const hidden = document.getElementById('selected-user-data');
            const pinInput = document.getElementById('user-pin-input').value;
            
            if (hidden.dataset.name && pinInput === hidden.dataset.pin) {
                currentUser = { 
                    name: hidden.dataset.name, 
                    firm: hidden.dataset.firm, 
                    pb: Number(hidden.dataset.pb), 
                    ps: Number(hidden.dataset.ps) 
                };

                // Schovat login, vytvořit zónu pro objednávku, pokud neexistuje
                document.getElementById('user-login').classList.add('hidden'); 
                
                // Přidáme zobrazení jména a košíku, pokud chybí v HTML
                let zone = document.getElementById('user-order-zone');
                if(!zone) {
                    zone = document.createElement('div');
                    zone.id = 'user-order-zone';
                    zone.innerHTML = `
                        <div class="bg-white p-6 rounded-[2.5rem] shadow-xl mb-6 text-center">
                            <h2 id="active-user-display" class="font-black text-xl italic uppercase text-slate-800"></h2>
                            <div id="published-status-msg" class="hidden text-red-500 font-bold mt-2">MENU JEŠTĚ NEBYLO ZVEŘEJNĚNO</div>
                            <div class="flex justify-between items-center mt-4 bg-slate-100 p-4 rounded-2xl">
                                <span class="font-black uppercase text-xs">Celkem k úhradě:</span>
                                <span id="total-price" class="font-black text-xl text-orange-600">0 Kč</span>
                            </div>
                            <button onclick="submitOrder()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg mt-4">Potvrdit objednávku ✅</button>
                        </div>
                        <div id="user-menu-grid" class="grid md:grid-cols-2 gap-4">
                            <div id="list-current"></div>
                            <div id="list-next"></div>
                        </div>
                    `;
                    document.getElementById('view-user').appendChild(zone);
                }
                
                document.getElementById('active-user-display').innerText = `🥗 ${currentUser.name} (${currentUser.firm})`;
                selectedItems = {}; 
                await loadOrderHistory(); 
                renderUserMenu();
            } else {
                alert("Chybné jméno nebo PIN!");
            }
        }
        
                // --- KUCHYŇ ---
        async function renderKitchen() {
            const { data: orders } = await _supabase.from('orders').select('*');
            const cont = document.getElementById('view-orders'); 
            cont.innerHTML = '<h2 class="text-3xl font-black uppercase italic text-center mb-8 pt-4">Kuchyň 👨‍🍳</h2>';
            
            if (!orders || orders.length === 0) {
                cont.innerHTML += '<p class="text-center text-slate-400 font-bold uppercase">Zatím žádné objednávky</p>';
                return;
            }

            DNY.forEach(den => {
                let counts = {}; // Celkový počet porcí daného jídla
                let firms = {};  // Rozdělení jídel podle firem
                let has = false;

                orders.forEach(o => { 
                    if(o.items) {
                        o.items.split(", ").forEach(it => { 
                            if(it.includes(`(${den})`)) { 
                                has = true; 
                                // Očistíme název jídla od dne v závorce
                                const mealName = it.replace(`(${den})`,'').trim(); 
                                
                                // Počítáme celkově
                                counts[mealName] = (counts[mealName] || 0) + 1; 
                                
                                // Počítáme pro konkrétní firmu
                                if(!firms[o.user_firm]) firms[o.user_firm] = {}; 
                                firms[o.user_firm][mealName] = (firms[o.user_firm][mealName] || 0) + 1; 
                            } 
                        }); 
                    }
                });

                if(has) {
                    let h = `
                    <div class="bg-white p-6 rounded-[2.5rem] shadow-lg border-l-8 border-green-500 mb-8 mx-auto max-w-4xl">
                        <h3 class="text-2xl font-black uppercase mb-6 italic text-green-600 border-b pb-2">${den}</h3>
                        <div class="grid md:grid-cols-2 gap-10">
                            <div>
                                <p class="text-[10px] font-black uppercase text-slate-400 mb-3 tracking-widest">Celkem uvařit:</p>
                                <div class="space-y-2">`;
                                    for(let m in counts) {
                                        h += `<div class="flex justify-between py-2 border-b border-slate-100 font-bold text-sm">
                                                <span class="text-slate-700">${m}</span>
                                                <span class="bg-orange-100 text-orange-600 px-3 py-1 rounded-full">${counts[m]}x</span>
                                              </div>`;
                                    }
                    h += `      </div>
                            </div>
                            <div>
                                <p class="text-[10px] font-black uppercase text-slate-400 mb-3 tracking-widest">Rozdělení do firem:</p>
                                <div class="space-y-4">`;
                                    for(let f in firms) { 
                                        h += `<div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 shadow-sm">
                                                <p class="font-black text-xs uppercase mb-2 text-blue-600 flex justify-between">
                                                    <span>🏢 ${f}</span>
                                                </p>`; 
                                        for(let m in firms[f]) {
                                            h += `<div class="flex justify-between text-xs font-bold py-1">
                       i                             <span class="text-slate-600">${m}</span>
                                                    <span class="text-slate-900">${firms[f][m]}x</span>
                                                  </div>`;
                                        }
                                        h += `</div>`; 
                                    }
                    h += `      </div>
                            </div>
                        </div>
                    </div>`;
                    cont.innerHTML += h;
                }
            });
        }

            function publishMenu() { 
        localStorage.setItem('menu_published', 'true'); 
        alert("Zveřejněno!"); 
    }

    async function rolloverWeek() { 
        if(confirm("Reset objednávek a posun menu?")) { 
            localStorage.setItem('menu_published', 'false'); 
            await _supabase.from('orders').delete().neq('user_name', ''); 
            await _supabase.from('meal_templates').delete().eq('week', 'current'); 
            await _supabase.from('meal_templates').update({ week: 'current' }).eq('week', 'next'); 
            renderAdmin(); 
        } 
    }
</script>
