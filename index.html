<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOMBA BOWLS - MASTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }</style>
</head>
<body class="pb-20">

    <nav class="bg-white shadow-sm p-4 sticky top-0 z-50 flex justify-between items-center border-b">
        <h1 class="text-xl font-black text-orange-500 italic uppercase">Bomba Bowls 🥗</h1>
        <div class="flex gap-1 text-[10px] font-bold">
            <button onclick="location.reload()" class="px-3 py-2 bg-gray-100 rounded-lg uppercase">Reset</button>
            <button onclick="secureView('admin')" class="px-3 py-2 bg-black text-white rounded-lg uppercase italic text-orange-400">Admin 🔒</button>
            <button onclick="secureView('orders')" class="px-3 py-2 bg-green-600 text-white rounded-lg uppercase italic">Kuchyň 🔒</button>
        </div>
    </nav>

    <section id="view-admin" class="hidden max-w-4xl mx-auto p-4 space-y-6 text-sm">
        <div class="bg-red-50 p-6 rounded-[2rem] border-2 border-red-100 text-center">
            <h3 class="font-black text-red-600 uppercase italic mb-3">Správa týdnů</h3>
            <button onclick="rolloverWeek()" class="bg-red-600 text-white px-8 py-4 rounded-2xl font-black uppercase text-xs shadow-lg">➔ PŘEKLOPIT TÝDEN</button>
        </div>

        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100">
            <h3 id="meal-form-title" class="font-black text-xs uppercase text-green-600 mb-4 italic">Nové Jídlo</h3>
            <div class="grid gap-2">
                <input id="m-id" type="hidden">
                <input id="m-name" placeholder="Název jídla" class="w-full p-4 bg-slate-50 rounded-xl font-bold">
                <textarea id="m-desc" placeholder="Popis / Složení jídla" class="w-full p-4 bg-slate-50 rounded-xl font-bold h-20"></textarea>
                <div class="grid grid-cols-3 gap-1">
                    <select id="m-day" class="p-3 bg-slate-50 rounded-xl font-bold text-[10px]">
                        <option>Pondělí</option><option>Úterý</option><option>Středa</option><option>Čtvrtek</option><option>Pátek</option>
                    </select>
                    <select id="m-cat" class="p-3 bg-slate-50 rounded-xl font-bold text-[10px]">
                        <option>Bowl</option><option>Polévka</option>
                    </select>
                    <select id="m-week" class="p-3 bg-slate-50 rounded-xl font-bold text-[10px]">
                        <option value="current">Tento</option><option value="next">Příští</option>
                    </select>
                </div>
                <button id="m-btn" onclick="saveMeal()" class="w-full bg-green-600 text-white py-4 rounded-xl font-black uppercase shadow-md">+ Přidat do menu</button>
                <button id="m-cancel" onclick="cancelEdit()" class="hidden w-full bg-gray-200 text-gray-600 py-2 rounded-xl font-bold uppercase text-[10px]">Zrušit úpravy</button>
            </div>
            <div id="admin-meals-list" class="mt-6 space-y-2"></div>
        </div>

        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100">
            <h3 class="font-black text-xs uppercase text-blue-600 mb-4 italic">Firmy a Ceny</h3>
            <div class="grid gap-2 mb-4">
                <input id="f-name" placeholder="Název firmy" class="w-full p-4 bg-slate-50 rounded-xl font-bold">
                <div class="grid grid-cols-2 gap-2">
                    <input id="f-bowl" type="number" placeholder="Bowl Kč" class="p-4 bg-slate-50 rounded-xl font-bold">
                    <input id="f-soup" type="number" placeholder="Soup Kč" class="p-4 bg-slate-50 rounded-xl font-bold">
                </div>
                <button onclick="addFirm()" class="bg-blue-600 text-white py-4 rounded-xl font-black uppercase text-[10px]">+ Přidat firmu</button>
            </div>
            <div id="admin-firms-list" class="space-y-1 text-[11px]"></div>
        </div>
    </section>

    <section id="view-orders" class="hidden max-w-4xl mx-auto p-4 space-y-10">
        <div><h2 class="text-2xl font-black uppercase italic text-slate-800 border-l-8 border-slate-300 pl-4 mb-6">Aktuální týden</h2><div id="kitchen-current" class="space-y-6"></div></div>
        <div><h2 class="text-2xl font-black uppercase italic text-orange-600 border-l-8 border-orange-500 pl-4 mb-6">Příští týden</h2><div id="kitchen-next" class="space-y-6"></div></div>
    </section>

    <section id="view-user" class="max-w-4xl mx-auto p-4">
        <div id="user-login" class="max-w-md mx-auto bg-white p-10 rounded-[2.5rem] shadow-2xl text-center mt-10 border-b-8 border-orange-500">
            <h2 class="text-2xl font-black mb-6 text-orange-500 uppercase italic">Přihlášení</h2>
            <select id="user-select" class="w-full p-5 rounded-2xl bg-slate-100 font-bold mb-4 appearance-none"></select>
            <input id="user-pin-input" type="password" inputmode="numeric" placeholder="Tvůj PIN" class="w-full p-5 rounded-2xl bg-slate-100 font-bold mb-6 text-center">
            <button onclick="userLogin()" class="bg-orange-500 text-white w-full py-5 rounded-2xl font-black text-xl uppercase">Vstoupit</button>
        </div>

        <div id="user-order-zone" class="hidden space-y-6">
            <div class="bg-blue-600 text-white p-5 rounded-[2rem] flex items-center justify-between shadow-lg">
                <div class="flex items-center gap-4 text-xs font-black italic"><a href="tel:+420605285174">📞 605 285 174</a></div>
                <div id="active-user-display" class="font-black italic text-xs uppercase"></div>
            </div>
            <div class="grid md:grid-cols-2 gap-8 items-start">
                <div class="space-y-4">
                    <h2 class="bg-slate-200 text-slate-700 p-3 rounded-2xl text-center font-black uppercase italic text-xs">Tento týden</h2>
                    <div id="list-current" class="space-y-4"></div>
                </div>
                <div class="space-y-4">
                    <h2 class="bg-orange-500 text-white p-3 rounded-2xl text-center font-black uppercase italic text-xs">Příští týden</h2>
                    <div id="list-next" class="space-y-4"></div>
                </div>
            </div>
            <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-md z-40 bg-white p-6 rounded-[2.5rem] shadow-2xl border flex justify-between items-center">
                <span id="total-price" class="text-3xl font-black text-green-600">0 Kč</span>
                <button id="save-btn" onclick="submitOrder()" class="bg-green-600 text-white px-8 py-4 rounded-2xl font-black uppercase text-sm shadow-lg">Uložit</button>
            </div>
        </div>
    </section>

    <script>
        const SUPABASE_URL = 'https://bepuispbvxkmidkztupi.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_T9PUk3RfftHoXwm2jz9ugg_l3GbE_Wy';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const DNY = ["Pondělí", "Úterý", "Středa", "Čtvrtek", "Pátek"];
        const ADMIN_PASS = "bomba2026";
        let currentUser = null, selectedItems = {};

        function secureView(v) { if(prompt("Heslo:") === ADMIN_PASS) switchView(v); else alert("Chyba!"); }
        function switchView(v) { document.querySelectorAll('section').forEach(s => s.classList.add('hidden')); document.getElementById('view-' + v).classList.remove('hidden'); if(v === 'admin') renderAdmin(); if(v === 'orders') renderKitchen(); }

        async function userLogin() {
            const sel = document.getElementById('user-select'), pinIn = document.getElementById('user-pin-input').value, opt = sel.options[sel.selectedIndex];
            if(pinIn === opt.dataset.pin) {
                currentUser = { name: opt.value, firm: opt.dataset.firm, pb: Number(opt.dataset.pb), ps: Number(opt.dataset.ps) };
                document.getElementById('active-user-display').innerText = currentUser.name;
                document.getElementById('user-login').classList.add('hidden'); document.getElementById('user-order-zone').classList.remove('hidden');
                await loadOrderHistory(); renderUserMenu();
            } else alert("Špatný PIN!");
        }

        async function saveMeal() {
            const id = document.getElementById('m-id').value, n = document.getElementById('m-name').value, d = document.getElementById('m-day').value, c = document.getElementById('m-cat').value, w = document.getElementById('m-week').value, ds = document.getElementById('m-desc').value;
            if(!n) return alert("Zadej název!");
            const obj = { name: n, day: d, category: c, week: w, description: ds };
            if(id) await _supabase.from('meals').update(obj).eq('id', id);
            else await _supabase.from('meals').insert([obj]);
            cancelEdit(); renderAdmin();
        }

        function editMeal(id, n, d, c, w, ds) {
            document.getElementById('m-id').value = id; document.getElementById('m-name').value = n; document.getElementById('m-day').value = d; document.getElementById('m-cat').value = c; document.getElementById('m-week').value = w; document.getElementById('m-desc').value = ds;
            document.getElementById('meal-form-title').innerText = "Upravit jídlo"; document.getElementById('m-btn').innerText = "Uložit změny"; document.getElementById('m-cancel').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelEdit() {
            document.getElementById('m-id').value = ""; document.getElementById('m-name').value = ""; document.getElementById('m-desc').value = "";
            document.getElementById('meal-form-title').innerText = "Nové jídlo"; document.getElementById('m-btn').innerText = "+ Přidat do menu"; document.getElementById('m-cancel').classList.add('hidden');
        }

        async function renderMeals() {
            const { data } = await _supabase.from('meals').select('*').order('day');
            document.getElementById('admin-meals-list').innerHTML = data?.map(m => `
                <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl border">
                    <div><p class="font-black text-[11px] uppercase text-slate-400 leading-none">${m.day} / ${m.week}</p><p class="font-bold text-xs">${m.name}</p></div>
                    <div class="flex gap-4">
                        <button onclick="editMeal('${m.id}', '${m.name}', '${m.day}', '${m.category}', '${m.week}', '${m.description||""}')" class="text-blue-500 font-bold">✏️</button>
                        <button onclick="delM('${m.id}')" class="text-red-400 font-bold">✕</button>
                    </div>
                </div>`).join("");
        }

        async function delM(id) { if(confirm("Smazat?")) { await _supabase.from('meals').delete().eq('id', id); renderAdmin(); } }

        async function renderUserMenu() {
            const { data: meals } = await _supabase.from('meals').select('*');
            const renderC = (w, id) => {
                const cont = document.getElementById(id); cont.innerHTML = "";
                DNY.forEach(den => {
                    const dm = meals?.filter(m => m.day === den && m.week === w);
                    if(dm?.length) {
                        let h = `<div class="bg-white p-5 rounded-3xl border shadow-sm"><h3 class="font-black text-[10px] text-slate-400 mb-2 uppercase">${den}</h3><div class="space-y-2">`;
                        dm.forEach(m => {
                            const u = `${m.name} (${den})`; const isS = selectedItems[u]; const p = m.category === 'Polévka' ? currentUser.ps : currentUser.pb;
                            h += `<div onclick="toggleSelect('${m.id}', '${u}', ${p})" class="p-4 rounded-2xl border-2 transition-all cursor-pointer ${isS ? 'border-green-500 bg-green-50' : 'bg-slate-50 border-transparent'}">
                                    <div class="flex justify-between items-start"><p class="font-black text-xs">${m.name}</p><p class="font-black text-xs text-orange-500 ml-2">${p} Kč</p></div>
                                    <p class="text-[10px] text-slate-500 leading-tight mt-1">${m.description || ''}</p>
                                  </div>`;
                        });
                        cont.innerHTML += h + `</div></div>`;
                    }
                });
            };
            renderC('current', 'list-current'); renderC('next', 'list-next');
        }

        function toggleSelect(id, name, price) { if(selectedItems[name]) delete selectedItems[name]; else selectedItems[name] = { name, price }; updateTotal(); renderUserMenu(); }
        function updateTotal() { let t = 0; for(let k in selectedItems) t += selectedItems[k].price; document.getElementById('total-price').innerText = t + " Kč"; }
        async function loadOrderHistory() { const { data } = await _supabase.from('orders').select('*').eq('user_name', currentUser.name).limit(1); selectedItems = {}; if(data?.[0]?.items) data[0].items.split(", ").forEach(it => { if(it) selectedItems[it] = { name: it, price: it.includes('Polévka') ? currentUser.ps : currentUser.pb }; }); updateTotal(); }
        async function submitOrder() { const f = Object.keys(selectedItems).join(", "); const btn = document.getElementById('save-btn'); const { data: ex } = await _supabase.from('orders').select('*').eq('user_name', currentUser.name).limit(1); if (ex?.length > 0) await _supabase.from('orders').update({ items: f, created_at: new Date().toISOString() }).eq('id', ex[0].id); else await _supabase.from('orders').insert([{ user_name: currentUser.name, user_firm: currentUser.firm, items: f }]); btn.innerText = "ULOŽENO!"; setTimeout(() => btn.innerText = "Uložit", 2000); }
        async function renderKitchen() { const { data: orders } = await _supabase.from('orders').select('*'); const rKW = (w, id) => { const c = document.getElementById(id); c.innerHTML = ""; DNY.forEach(den => { let dt = {}, df = {}, has = false; orders?.forEach(o => { if(o.items) o.items.split(", ").forEach(it => { if(it.includes(`(${den})`)) { has = true; const m = it.replace(`(${den})`,'').trim(); dt[m] = (dt[m]||0)+1; if(!df[o.user_firm]) df[o.user_firm]={}; df[o.user_firm][m] = (df[o.user_firm][m]||0)+1; } }); }); if(has) { let h = `<div class="bg-white p-6 rounded-[2rem] border shadow-sm"><h3 class="text-xl font-black text-slate-800 uppercase mb-4 italic">${den}</h3><div class="grid md:grid-cols-2 gap-4"><div>`; for(let m in dt) h += `<div class="flex justify-between py-1 border-b text-sm font-bold"><span>${m}</span><span>${dt[m]}x</span></div>`; h += `</div><div>`; for(let f in df) { h += `<div class="mb-2 p-3 bg-slate-50 rounded-xl"><p class="font-black text-[10px] uppercase underline mb-1">${f}</p>`; for(let m in df[f]) h += `<div class="flex justify-between text-xs font-bold"><span>${m}</span><span>${df[f][m]}x</span></div>`; h += `</div>`; } c.innerHTML += h + `</div></div></div>`; } }); if(!c.innerHTML) c.innerHTML = "<p class='text-slate-400 font-bold'>Žádné objednávky.</p>"; }; rKW('current', 'kitchen-current'); rKW('next', 'kitchen-next'); }
        async function renderAdmin() { renderFirms(); renderMeals(); const { data: firms } = await _supabase.from('firms').select('*').order('name'); const sel = document.getElementById('c-firm'); if(sel) { sel.innerHTML = '<option value="">Vyber firmu</option>'; firms?.forEach(f => sel.innerHTML += `<option value="${f.name}">${f.name}</option>`); } }
        async function addFirm() { const n = document.getElementById('f-name').value, pb = document.getElementById('f-bowl').value, ps = document.getElementById('f-soup').value; if(n) { await _supabase.from('firms').insert([{ name: n, custom_price_bowl: Number(pb), custom_price_soup: Number(ps) }]); renderAdmin(); } }
        async function renderFirms() { const { data } = await _supabase.from('firms').select('*').order('name'); document.getElementById('admin-firms-list').innerHTML = data?.map(f => `<div class="flex justify-between border-b py-1"><span>${f.name}</span><button onclick="delF('${f.id}')" class="text-red-400">✕</button></div>`).join(""); }
        async function delF(id) { await _supabase.from('firms').delete().eq('id', id); renderAdmin(); }
        async function rolloverWeek() { if(confirm("PŘEKLOPIT TÝDEN?")) { await _supabase.from('orders').delete().neq('user_name', ''); await _supabase.from('meals').delete().eq('week', 'current'); await _supabase.from('meals').update({ week: 'current' }).eq('week', 'next'); alert("Hotovo!"); renderAdmin(); } }
        async function loadInitial() { const { data: c } = await _supabase.from('customers').select('*').order('name'); const { data: f } = await _supabase.from('firms').select('*'); const sel = document.getElementById('user-select'); if(sel) { sel.innerHTML = '<option value="">-- VYBER JMÉNO --</option>'; c?.forEach(p => { const fr = f?.find(x => x.name === p.firm_name); sel.innerHTML += `<option value="${p.name}" data-pin="${p.pin}" data-firm="${p.firm_name}" data-pb="${fr?.custom_price_bowl}" data-ps="${fr?.custom_price_soup}">${p.name}</option>`; }); } }
        loadInitial();
    </script>
</body>
</html>
