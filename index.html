<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOMBA BOWLS - MASTER ADMIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="pb-24">

    <nav class="bg-white shadow-sm p-4 sticky top-0 z-50 flex justify-between items-center border-b-2 border-orange-500">
        <h1 class="text-xl font-black text-orange-500 italic uppercase tracking-tighter">Bomba Admin 🥗</h1>
        <div class="flex gap-2">
            <button onclick="renderAdmin()" class="px-4 py-2 bg-slate-100 text-slate-600 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-slate-200">↻ Obnovit data</button>
            <button onclick="window.location.reload()" class="px-4 py-2 bg-black text-white rounded-xl text-[10px] font-black uppercase italic text-orange-400">Odhlásit</button>
        </div>
    </nav>

    <section id="view-admin" class="max-w-6xl mx-auto p-4 space-y-8 mt-4">
        
        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border-t-8 border-green-500">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-black text-xl uppercase italic text-green-700">🛒 Sklad jídel <span class="text-slate-300 font-normal text-sm ml-2">/meals</span></h2>
                <button onclick="document.getElementById('add-meal-form').classList.toggle('hidden')" class="bg-green-100 text-green-700 px-4 py-2 rounded-full font-black text-[10px] uppercase">+ Nové jídlo</button>
            </div>

            <div id="add-meal-form" class="hidden grid gap-3 mb-8 bg-slate-50 p-6 rounded-[2rem] border-2 border-dashed border-slate-200">
                <input id="m-name" placeholder="Název jídla" class="w-full p-4 rounded-2xl border-none font-bold shadow-sm">
                <textarea id="m-desc" placeholder="Složení / Popis" class="w-full p-4 rounded-2xl border-none font-bold h-20 shadow-sm"></textarea>
                <div class="grid grid-cols-2 gap-3">
                    <select id="m-cat" class="p-4 rounded-2xl border-none font-bold shadow-sm bg-white">
                        <option>Bowl</option><option>Polévka</option>
                    </select>
                    <button onclick="addMealToLibrary()" class="bg-green-600 text-white rounded-2xl font-black uppercase shadow-lg">Uložit do skladu</button>
                </div>
            </div>

            <div id="library-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                </div>
        </div>

        <div class="bg-orange-50 p-6 rounded-[2.5rem] border-2 border-orange-200 shadow-sm">
            <h2 class="font-black text-xl uppercase mb-6 italic text-orange-700 text-center">🗓️ Plánování týdenního menu</h2>
            <div id="admin-menu-plan" class="grid md:grid-cols-2 gap-8">
                </div>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border-t-8 border-blue-500">
                <h3 class="font-black text-blue-600 mb-4 uppercase italic tracking-widest">Správa Firem</h3>
                <div class="space-y-2 mb-6 bg-blue-50 p-5 rounded-[2rem]">
                    <input id="f-name" placeholder="Název firmy" class="w-full p-3 rounded-xl border-none font-bold shadow-sm">
                    <div class="grid grid-cols-2 gap-2">
                        <input id="f-bowl" type="number" placeholder="Cena Bowl" class="p-3 rounded-xl border-none font-bold shadow-sm">
                        <input id="f-soup" type="number" placeholder="Cena Soup" class="p-3 rounded-xl border-none font-bold shadow-sm">
                    </div>
                    <button onclick="addFirm()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-black uppercase text-[10px] mt-2 shadow-md">Přidat firmu</button>
                </div>
                <div id="admin-firms-list" class="space-y-2 max-h-64 overflow-y-auto custom-scroll pr-2"></div>
            </div>

            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border-t-8 border-orange-500">
                <h3 class="font-black text-orange-600 mb-4 uppercase italic tracking-widest">Zákazníci & PINy</h3>
                <div class="space-y-2 mb-6 bg-orange-50 p-5 rounded-[2rem]">
                    <input id="c-name" placeholder="Celé jméno" class="w-full p-3 rounded-xl border-none font-bold shadow-sm">
                    <select id="c-firm" class="w-full p-3 rounded-xl border-none font-bold shadow-sm bg-white"></select>
                    <input id="c-pin" type="number" placeholder="Čtyřmístný PIN" class="w-full p-3 rounded-xl border-none font-bold shadow-sm">
                    <button onclick="addCustomer()" class="w-full bg-orange-500 text-white py-3 rounded-xl font-black uppercase text-[10px] mt-2 shadow-md">Vytvořit PIN</button>
                </div>
                <div id="admin-customers-list" class="space-y-2 max-h-64 overflow-y-auto custom-scroll pr-2"></div>
            </div>
        </div>

        <div class="bg-red-600 p-8 rounded-[3rem] text-center shadow-xl">
            <h3 class="text-white font-black uppercase italic mb-2">Generální reset</h3>
            <p class="text-red-100 text-xs mb-6">Smaže všechny objednávky v tabulce 'orders' a přesune 'Příští týden' na 'Tento'.</p>
            <button onclick="rolloverWeek()" class="bg-white text-red-600 px-12 py-4 rounded-2xl font-black uppercase hover:scale-105 transition-all shadow-2xl">➔ Provést překlopení týdne</button>
        </div>
    </section>

    <script>
        const SUPABASE_URL = 'https://bepuispbvxkmidkztupi.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_T9PUk3RfftHoXwm2jz9ugg_l3GbE_Wy';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const DNY = ["Pondělí", "Úterý", "Středa", "Čtvrtek", "Pátek"];

        async function renderAdmin() {
            console.log("Načítám data...");
            await Promise.all([renderLibrary(), renderAdminMenu(), renderFirms(), renderCustomers()]);
        }

        // --- 1. SKLAD (Tabulka: meals) ---
        async function renderLibrary() {
            const { data } = await _supabase.from('meals').select('*').order('name');
            const cont = document.getElementById('library-list');
            cont.innerHTML = data?.map(m => `
                <div class="bg-white p-4 rounded-3xl border border-slate-200 shadow-sm flex flex-col justify-between hover:border-green-300 transition-colors">
                    <div>
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[8px] font-black px-2 py-1 bg-slate-100 rounded text-slate-500 uppercase">${m.category}</span>
                            <button onclick="deleteFromLibrary('${m.id}')" class="text-red-300 hover:text-red-600 text-xs">✕</button>
                        </div>
                        <p class="font-bold text-sm leading-tight">${m.name}</p>
                    </div>
                    <div class="mt-4 space-y-1">
                        <select onchange="addMealToPlan('${m.id}', this.value, 'current')" class="text-[10px] border-none rounded-lg p-2 font-black w-full bg-green-50 text-green-700 cursor-pointer"><option>+ Tento T.</option>${DNY.map(d=>`<option value="${d}">${d}</option>`)}</select>
                        <select onchange="addMealToPlan('${m.id}', this.value, 'next')" class="text-[10px] border-none rounded-lg p-2 font-black w-full bg-orange-50 text-orange-700 cursor-pointer"><option>+ Příští T.</option>${DNY.map(d=>`<option value="${d}">${d}</option>`)}</select>
                    </div>
                </div>
            `).join("") || "Sklad je prázdný.";
        }

        async function addMealToLibrary() {
            const n = document.getElementById('m-name').value, d = document.getElementById('m-desc').value, c = document.getElementById('m-cat').value;
            if(!n) return alert("Zadej název!");
            await _supabase.from('meals').insert([{ name: n, description: d, category: c }]);
            document.getElementById('m-name').value = ""; document.getElementById('m-desc').value = "";
            renderLibrary();
        }

        async function deleteFromLibrary(id) { if(confirm("Smazat jídlo trvale ze skladu?")) { await _supabase.from('meals').delete().eq('id', id); renderLibrary(); } }

        // --- 2. MENU (Tabulka: meal_templates) ---
        async function addMealToPlan(libId, den, week) {
            if(!den || den.includes("+")) return;
            const { data: lib } = await _supabase.from('meals').select('*').eq('id', libId).single();
            await _supabase.from('meal_templates').insert([{ name: lib.name, description: lib.description, category: lib.category, day: den, week: week }]);
            renderAdminMenu();
        }

        async function renderAdminMenu() {
            const { data } = await _supabase.from('meal_templates').select('*').order('day');
            const cont = document.getElementById('admin-menu-plan');
            cont.innerHTML = ['current', 'next'].map(w => `
                <div class="bg-white p-6 rounded-[2.5rem] border shadow-sm">
                    <h4 class="font-black uppercase text-[10px] text-slate-400 mb-4 tracking-[0.2em] text-center">${w==='current'?'Aktuální Menu':'Příští Menu'}</h4>
                    <div class="space-y-2">
                        ${DNY.map(den => {
                            const dm = data?.filter(m => m.day === den && m.week === w);
                            return dm?.map(m => `
                                <div class="flex justify-between items-center text-xs bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                    <span class="font-bold"><span class="text-orange-500 uppercase mr-2">${m.day.substring(0,2)}</span> ${m.name}</span>
                                    <button onclick="deletePlan('${m.id}')" class="text-red-500 font-black p-1 hover:bg-red-50 rounded">✕</button>
                                </div>
                            `).join("");
                        }).join("") || "<p class='text-center text-[10px] opacity-30'>Zatím nic...</p>"}
                    </div>
                </div>
            `).join("");
        }

        async function deletePlan(id) { await _supabase.from('meal_templates').delete().eq('id', id); renderAdminMenu(); }

        // --- 3. FIRMY & ZÁKAZNÍCI ---
        async function renderFirms() {
            const { data } = await _supabase.from('firms').select('*').order('name');
            document.getElementById('admin-firms-list').innerHTML = data?.map(f => `
                <div class="flex justify-between items-center bg-white p-3 rounded-2xl border shadow-sm">
                    <span class="font-bold text-xs">${f.name} <span class="text-blue-500 ml-2">${f.custom_price_bowl}/${f.custom_price_soup} Kč</span></span>
                    <button onclick="deleteFirm('${f.id}')" class="text-red-400 hover:text-red-600">✕</button>
                </div>`).join("");
            const sel = document.getElementById('c-firm'); sel.innerHTML = '<option value="">Vyber firmu</option>';
            data?.forEach(f => sel.innerHTML += `<option value="${f.name}">${f.name}</option>`);
        }

        async function addFirm() {
            const n = document.getElementById('f-name').value, pb = document.getElementById('f-bowl').value, ps = document.getElementById('f-soup').value;
            if(!n) return;
            await _supabase.from('firms').insert([{ name: n, custom_price_bowl: Number(pb), custom_price_soup: Number(ps) }]);
            document.getElementById('f-name').value = "";
            renderFirms();
        }

        async function deleteFirm(id) { if(confirm("Smazat firmu?")) { await _supabase.from('firms').delete().eq('id', id); renderFirms(); } }

        async function renderCustomers() {
            const { data } = await _supabase.from('customers').select('*').order('name');
            document.getElementById('admin-customers-list').innerHTML = data?.map(c => `
                <div class="flex justify-between items-center bg-white p-3 rounded-2xl border shadow-sm">
                    <div class="font-bold text-xs"><p>${c.name}</p><p class="text-[9px] text-slate-400 uppercase">${c.firm_name} • PIN: ${c.pin}</p></div>
                    <button onclick="deleteCust('${c.id}')" class="text-red-400 hover:text-red-600">✕</button>
                </div>`).join("");
        }

        async function addCustomer() {
            const n = document.getElementById('c-name').value, f = document.getElementById('c-firm').value, p = document.getElementById('c-pin').value;
            if(!n || !f || !p) return alert("Vyplň vše!");
            await _supabase.from('customers').insert([{ name: n, firm_name: f, pin: p }]);
            document.getElementById('c-name').value = ""; document.getElementById('c-pin').value = "";
            renderCustomers();
        }

        async function deleteCust(id) { if(confirm("Smazat zákazníka?")) { await _supabase.from('customers').delete().eq('id', id); renderCustomers(); } }

        async function rolloverWeek() {
            if(confirm("POZOR: Smažete všechny objednávky a menu se posune o týden. Chcete pokračovat?")) {
                await _supabase.from('orders').delete().neq('user_name', '');
                await _supabase.from('meal_templates').delete().eq('week', 'current');
                await _supabase.from('meal_templates').update({ week: 'current' }).eq('week', 'next');
                alert("Týden byl překlopen!");
                renderAdmin();
            }
        }

        // START
        renderAdmin();
    </script>
</body>
</html>
